<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Dolor lumbar y entrenamiento de fuerza">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1630"/>
      <stop offset="1" stop-color="#0B0B1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9e6ad"/>
      <stop offset="1" stop-color="#9A7A28"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f8ff0"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect x="64" y="60" width="270" height="52" rx="26" fill="#C9A84C" opacity="0.16"/>
  <text x="199" y="94" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2" fill="#e6c976">SALUD Y DOLOR</text>
  <!-- stylized spine -->
  <g transform="translate(820,120)">
    <path d="M60,10 C120,90 0,150 60,230 C120,310 0,370 60,450" fill="none" stroke="#2a2f55" stroke-width="26" stroke-linecap="round"/>
    <g fill="url(#gold)">
      <rect x="30" y="20"  width="70" height="34" rx="10"/>
      <rect x="18" y="90"  width="80" height="36" rx="10"/>
      <rect x="14" y="165" width="86" height="38" rx="10"/>
      <rect x="18" y="245" width="80" height="38" rx="10" fill="url(#blue)"/>
      <rect x="24" y="325" width="74" height="36" rx="10"/>
      <rect x="32" y="400" width="66" height="34" rx="10"/>
    </g>
    <!-- neutral-spine indicator -->
    <circle cx="58" cy="264" r="16" fill="none" stroke="#6f8ff0" stroke-width="6"/>
  </g>
  <text x="64" y="470" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#E8E8F0">Dolor lumbar</text>
  <text x="64" y="540" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#gold)">y fuerza</text>
  <g transform="translate(1090,585)" opacity="0.9">
    <text font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#gold)">C</text>
    <text x="26" font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#blue)">C</text>
  </g>
</svg>
