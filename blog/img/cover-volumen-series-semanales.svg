<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Volumen y series semanales para hipertrofia">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141433"/>
      <stop offset="1" stop-color="#0B0B1A"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#1D4ED8"/>
      <stop offset="1" stop-color="#6f8ff0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2d68a"/>
      <stop offset="1" stop-color="#9A7A28"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.75" cy="0.7" r="0.6">
      <stop offset="0" stop-color="#1D4ED8" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect x="64" y="60" width="220" height="52" rx="26" fill="#1D4ED8" opacity="0.16"/>
  <text x="174" y="94" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2" fill="#9fb4f7">HIPERTROFIA</text>
  <!-- dose-response curve of volume -->
  <g transform="translate(660,120)">
    <line x1="0" y1="0" x2="0" y2="400" stroke="#2a2f55" stroke-width="4"/>
    <line x1="0" y1="400" x2="470" y2="400" stroke="#2a2f55" stroke-width="4"/>
    <path d="M0,380 C120,300 200,150 300,120 C360,105 420,150 470,230" fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round"/>
    <circle cx="300" cy="120" r="12" fill="#f2d68a"/>
    <g fill="url(#blue)">
      <rect x="30"  y="330" width="34" height="70" rx="5"/>
      <rect x="110" y="250" width="34" height="150" rx="5"/>
      <rect x="190" y="185" width="34" height="215" rx="5"/>
      <rect x="270" y="150" width="34" height="250" rx="5"/>
      <rect x="350" y="210" width="34" height="190" rx="5"/>
    </g>
  </g>
  <text x="64" y="470" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#E8E8F0">Volumen</text>
  <text x="64" y="540" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#gold)">semanal</text>
  <g transform="translate(1090,585)" opacity="0.9">
    <text font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#gold)">C</text>
    <text x="26" font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#blue)">C</text>
  </g>
</svg>
