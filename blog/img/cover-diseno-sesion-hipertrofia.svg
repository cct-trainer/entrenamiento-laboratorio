<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Diseño de sesión de hipertrofia">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141433"/>
      <stop offset="1" stop-color="#0B0B1A"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f8ff0"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f2d68a"/>
      <stop offset="1" stop-color="#9A7A28"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#1D4ED8" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#1D4ED8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <!-- category chip -->
  <rect x="64" y="60" width="220" height="52" rx="26" fill="#1D4ED8" opacity="0.16"/>
  <text x="174" y="94" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2" fill="#9fb4f7">HIPERTROFIA</text>
  <!-- session blocks (structure of a session) -->
  <g transform="translate(700,150)">
    <rect x="0"   y="240" width="70" height="120" rx="8" fill="url(#blue)"/>
    <rect x="90"  y="150" width="70" height="210" rx="8" fill="url(#blue)"/>
    <rect x="180" y="90"  width="70" height="270" rx="8" fill="url(#gold)"/>
    <rect x="270" y="180" width="70" height="180" rx="8" fill="url(#blue)"/>
    <line x1="-10" y1="378" x2="360" y2="378" stroke="#2a2f55" stroke-width="4"/>
  </g>
  <!-- headline hint -->
  <text x="64" y="470" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#E8E8F0">Estructura de</text>
  <text x="64" y="540" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#gold)">una sesión</text>
  <!-- CC monogram -->
  <g transform="translate(1090,585)" opacity="0.9">
    <text font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#gold)">C</text>
    <text x="26" font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#blue)">C</text>
  </g>
</svg>
