<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Biomecánica de la sentadilla">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1630"/>
      <stop offset="1" stop-color="#0B0B1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f9e6ad"/>
      <stop offset="1" stop-color="#9A7A28"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6f8ff0"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.72" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#C9A84C" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#glow)"/>
  <rect x="64" y="60" width="270" height="52" rx="26" fill="#1D4ED8" opacity="0.16"/>
  <text x="199" y="94" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="2" fill="#9fb4f7">BIOMECÁNICA</text>
  <!-- squat figure with barbell -->
  <g transform="translate(740,150)" stroke="url(#gold)" stroke-width="14" stroke-linecap="round" fill="none">
    <!-- barbell -->
    <line x1="20" y1="70" x2="300" y2="70" stroke="url(#blue)" stroke-width="16"/>
    <circle cx="20"  cy="70" r="34" fill="url(#blue)" stroke="none"/>
    <circle cx="300" cy="70" r="34" fill="url(#blue)" stroke="none"/>
    <!-- torso -->
    <line x1="160" y1="70" x2="150" y2="210"/>
    <!-- thigh (parallel) -->
    <line x1="150" y1="210" x2="250" y2="215"/>
    <!-- shin -->
    <line x1="250" y1="215" x2="250" y2="360"/>
    <!-- foot -->
    <line x1="215" y1="360" x2="300" y2="360"/>
    <!-- depth arc -->
    <path d="M110,215 a80,80 0 0 0 80,80" stroke="#e6c976" stroke-width="6" stroke-dasharray="10 12"/>
  </g>
  <text x="64" y="470" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="#E8E8F0">Biomecánica</text>
  <text x="64" y="540" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="800" fill="url(#gold)">de la sentadilla</text>
  <g transform="translate(1090,585)" opacity="0.9">
    <text font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#gold)">C</text>
    <text x="26" font-family="Georgia, serif" font-size="46" font-weight="700" fill="url(#blue)">C</text>
  </g>
</svg>
