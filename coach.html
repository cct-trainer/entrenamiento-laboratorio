<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Coach Panel — Christian Cattaneo</title>
<meta name="theme-color" content="#C9A84C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Coach SOCC">
<link rel="manifest" href="coach-manifest.json">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d1a;--card:#13132a;--card2:#1a1a38;
  --gold:#C9A84C;--gold-d:#9A7A28;--green:#22c55e;
  --text:#e8e8f0;--muted:#8888aa;--border:rgba(255,255,255,.08);
  --red:#f87171;--blue:#60a5fa;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

/* ── LOGIN ────────────────────────────────────────────────────────── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px;text-align:center;}
.login-logo{font-size:64px;margin-bottom:16px;}
.login-title{font-size:24px;font-weight:900;color:var(--gold);margin-bottom:4px;letter-spacing:-.5px;}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:40px;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:32px;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2.5px solid rgba(255,255,255,.15);background:transparent;transition:all .15s;}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(201,168,76,.4);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;width:100%;}
.pin-btn{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 8px;font-size:24px;font-weight:700;color:var(--text);cursor:pointer;transition:all .12s;letter-spacing:0;}
.pin-btn:active,.pin-btn:focus{background:var(--gold);color:#0d0d1a;border-color:var(--gold);outline:none;}
.pin-err{color:var(--red);font-size:12px;margin-top:12px;min-height:18px;font-weight:700;}

/* ── LOADING ─────────────────────────────────────────────────────── */
#loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;}
.spinner{width:36px;height:36px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── APP ─────────────────────────────────────────────────────────── */
#app{display:none;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;}

/* ── HEADER ──────────────────────────────────────────────────────── */
.hdr{background:linear-gradient(180deg,#1a1a3a 0%,transparent 100%);padding:28px 20px 14px;}
.hdr-row{display:flex;align-items:center;gap:14px;}
.coach-av{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#7a5a10);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden;border:2px solid rgba(201,168,76,.4);}
.coach-av img{width:100%;height:100%;object-fit:cover;}
.coach-nombre{font-size:18px;font-weight:900;color:#fff;line-height:1.1;}
.coach-tag{font-size:9px;color:var(--gold);margin-top:3px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;}
.hdr-date{margin-left:auto;text-align:right;flex-shrink:0;}
.hdr-dia{font-size:13px;font-weight:900;color:var(--gold);letter-spacing:.5px;}
.hdr-fecha{font-size:10px;color:var(--muted);margin-top:2px;}

/* ── BOTTOM NAV ──────────────────────────────────────────────────── */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#13132a;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;padding:10px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:9px;font-weight:800;letter-spacing:.6px;}
.nb svg{width:22px;height:22px;stroke-width:1.8;}
.nb.on{color:var(--gold);}

/* ── TABS ────────────────────────────────────────────────────────── */
.tab{padding:12px 16px 100px;display:none;}
.tab.on{display:block;}

/* ── SECTION HEADER ──────────────────────────────────────────────── */
.sec-hdr{font-size:9px;font-weight:900;color:var(--gold);letter-spacing:1.5px;text-transform:uppercase;margin:18px 0 10px;}

/* ── ALUMNO CARD ─────────────────────────────────────────────────── */
.al-card{background:var(--card);border-radius:16px;margin-bottom:10px;overflow:hidden;}
.al-card-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.al-av{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#7a5a10);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0;overflow:hidden;}
.al-av img{width:100%;height:100%;object-fit:cover;}
.al-nombre{font-size:14px;font-weight:800;color:var(--text);}
.al-sub{font-size:10px;color:var(--muted);margin-top:2px;line-height:1.4;}
.al-body{padding:0 16px 14px;}
.al-badge{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--green);font-size:9px;font-weight:800;padding:3px 8px;border-radius:20px;flex-shrink:0;white-space:nowrap;}

/* ── EJ LIST ─────────────────────────────────────────────────────── */
.ej-list{display:flex;flex-direction:column;gap:2px;}
.ej-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);}
.ej-item:last-child{border-bottom:none;}
.ej-bullet{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.ej-txt{font-size:12px;color:var(--text);flex:1;line-height:1.3;}
.ej-det{font-size:10px;color:var(--muted);text-align:right;flex-shrink:0;}

/* ── SEMANA GRID ─────────────────────────────────────────────────── */
.sem-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:20px;}
.sem-col{background:var(--card);border-radius:10px;overflow:hidden;min-height:40px;}
.sem-col-hdr{padding:5px 3px;text-align:center;font-size:8px;font-weight:800;color:var(--muted);letter-spacing:.5px;}
.sem-col.hoy .sem-col-hdr{color:var(--gold);background:rgba(201,168,76,.08);}
.sem-chip{margin:2px 3px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);border-radius:5px;padding:3px 4px;font-size:8px;font-weight:700;color:var(--gold);text-align:center;cursor:pointer;word-break:break-all;line-height:1.3;}
.sem-chip:active{background:rgba(201,168,76,.25);}

/* ── FEEDBACK CARD ───────────────────────────────────────────────── */
.fb-card{background:var(--card);border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.fb-card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.fb-alumno{font-size:13px;font-weight:800;color:var(--text);}
.fb-fecha{font-size:10px;color:var(--muted);}
.fb-metrics{display:flex;flex-wrap:wrap;gap:5px;}
.fb-met{background:rgba(255,255,255,.05);border-radius:8px;padding:5px 10px;font-size:10px;display:flex;gap:4px;align-items:center;}
.fb-met-lbl{color:var(--muted);font-weight:700;}
.fb-met-val{color:var(--gold);font-weight:900;}
.fb-obs{font-size:11px;color:var(--muted);margin-top:8px;font-style:italic;line-height:1.5;padding-top:8px;border-top:1px solid var(--border);}

/* ── DETAIL OVERLAY ──────────────────────────────────────────────── */
#al-detail{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;flex-direction:column;overflow-y:auto;max-width:480px;margin:0 auto;}
.detail-hdr{display:flex;align-items:center;gap:12px;padding:32px 20px 16px;background:linear-gradient(180deg,#1a1a3a 0%,transparent 100%);position:sticky;top:0;z-index:10;}
.detail-back{background:rgba(255,255,255,.07);border:none;border-radius:10px;color:var(--text);padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}
.detail-nombre{font-size:17px;font-weight:900;color:#fff;flex:1;line-height:1.2;}

/* ── BADGE DIAS ──────────────────────────────────────────────────── */
.dia-badge{display:inline-block;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:var(--gold);font-size:9px;font-weight:800;padding:3px 9px;border-radius:12px;}

/* ── EMPTY STATE ─────────────────────────────────────────────────── */
.empty{text-align:center;padding:50px 20px;}
.empty-ico{font-size:44px;margin-bottom:12px;}
.empty-ttl{font-size:15px;font-weight:800;color:var(--text);margin-bottom:6px;}
.empty-txt{font-size:12px;color:var(--muted);line-height:1.5;}

/* ── STAT MINI ───────────────────────────────────────────────────── */
.stat-mini{background:var(--card);border-radius:12px;padding:12px 14px;text-align:center;}
.stat-mini-lbl{font-size:8px;font-weight:900;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
.stat-mini-val{font-size:22px;font-weight:900;color:var(--gold);margin-top:4px;line-height:1;}
.stat-mini-u{font-size:10px;color:var(--muted);}

/* ── DAY TABS ────────────────────────────────────────────────────── */
.day-tabs{display:flex;gap:6px;overflow-x:auto;padding:4px 0 12px;scrollbar-width:none;-ms-overflow-style:none;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-tab{flex-shrink:0;padding:8px 15px;border-radius:22px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.8px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;}
.day-tab.has{border-color:rgba(201,168,76,.4);color:var(--text);}
.day-tab.no{opacity:.3;cursor:default;}
.day-tab.active{background:var(--gold);border-color:var(--gold);color:#0d0d1a !important;}

/* ── WEEK NAV ────────────────────────────────────────────────────── */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.wnav-btn{background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);padding:7px 16px;font-size:16px;cursor:pointer;}
.wnav-btn:disabled{opacity:.3;cursor:default;}
.wnav-lbl{font-size:11px;font-weight:800;color:var(--muted);text-align:center;}

/* ── BLOQUE ──────────────────────────────────────────────────────── */
.blq{background:var(--card);border-radius:14px;margin-bottom:10px;overflow:hidden;}
.blq-hdr{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(201,168,76,.06);border-bottom:1px solid var(--border);}
.blq-letra{width:28px;height:28px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#0d0d1a;flex-shrink:0;}
.blq-nombre{font-size:12px;font-weight:800;color:var(--text);text-transform:uppercase;letter-spacing:.5px;}

/* ── EJERCICIO COACH ─────────────────────────────────────────────── */
.ejc{padding:12px 14px;border-bottom:1px solid var(--border);}
.ejc:last-child{border-bottom:none;}
.ejc-nombre{font-size:15px;font-weight:900;color:var(--text);border-left:3px solid var(--gold);padding-left:9px;line-height:1.25;margin-bottom:5px;}
.ejc-ctrl{font-size:11px;color:var(--muted);font-weight:700;margin:0 0 8px 12px;}

/* ── SERIES TABLE ────────────────────────────────────────────────── */
.st{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px;}
.st th{background:rgba(201,168,76,.08);color:var(--muted);font-size:9px;font-weight:900;letter-spacing:.8px;padding:5px 8px;text-align:center;border:1px solid var(--border);}
.st td{padding:7px 8px;text-align:center;border:1px solid var(--border);color:var(--text);font-weight:700;}
.st tr:nth-child(even) td{background:rgba(255,255,255,.025);}
.st .aprox td{opacity:.55;font-style:italic;}

/* ── EMPTY DAY ───────────────────────────────────────────────────── */
.empty-day{text-align:center;padding:36px 20px;color:var(--muted);font-size:13px;line-height:1.6;}

/* ── COACH EDITS ─────────────────────────────────────────────────── */
.peso-inp{width:56px;background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:6px;color:var(--text);text-align:center;font-size:11px;font-weight:700;padding:4px 3px;-moz-appearance:textfield;font-family:inherit;}
.peso-inp::-webkit-outer-spin-button,.peso-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.peso-inp:focus{outline:none;border-color:var(--gold);background:rgba(201,168,76,.14);}
.peso-inp.edited{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,.1);}
.nota-inp{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:11px;padding:8px 10px;resize:none;margin-top:8px;font-family:inherit;line-height:1.4;min-height:34px;overflow:hidden;}
.nota-inp:focus{outline:none;border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.04);}
.nota-inp::placeholder{color:var(--muted);}
.nota-inp.has-nota{border-color:rgba(201,168,76,.35);background:rgba(201,168,76,.05);}
.save-toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(34,197,94,.9);color:#fff;font-size:11px;font-weight:800;padding:6px 16px;border-radius:20px;z-index:999;pointer-events:none;opacity:0;transition:opacity .25s;}
.save-toast.show{opacity:1;}

/* ── PLAN CHIPS ─────────────────────────────────────────────────── */
.plan-chip{flex-shrink:0;padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--card);color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.5px;cursor:pointer;white-space:nowrap;}
.plan-chip.active{background:rgba(201,168,76,.15);border-color:var(--gold);color:var(--gold);}

/* ── WHATSAPP BTN ───────────────────────────────────────────────── */
.wa-btn{display:flex;align-items:center;justify-content:center;width:42px;height:42px;border-radius:50%;background:rgba(37,211,102,.12);border:1.5px solid rgba(37,211,102,.3);color:#25d366;flex-shrink:0;text-decoration:none;transition:all .15s;}
.wa-btn:active{background:rgba(37,211,102,.25);}

/* ── REFRESH BTN ────────────────────────────────────────────────── */
.refresh-btn{background:rgba(255,255,255,.07);border:1px solid var(--border);border-radius:10px;color:var(--muted);width:36px;height:36px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.refresh-btn:active{color:var(--gold);transform:rotate(180deg);}

/* ── SEARCH ─────────────────────────────────────────────────────── */
.al-search{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 14px;color:var(--text);font-size:13px;font-family:inherit;margin-bottom:14px;}
.al-search:focus{outline:none;border-color:rgba(201,168,76,.4);}
.al-search::placeholder{color:var(--muted);}

/* ── SESIÓN COMPLETADA ──────────────────────────────────────────── */
.ses-hist-item{background:var(--card);border-radius:12px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.shi-check{width:34px;height:34px;border-radius:50%;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
</style>
</head>

<!-- ══ ALUMNO DETAIL OVERLAY ══════════════════════════════════════════ -->
<div id="al-detail">
  <div class="detail-hdr">
    <button class="detail-back" onclick="closeDetail()">← Volver</button>
    <div class="detail-nombre" id="detail-nombre">—</div>
    <div style="display:flex;align-items:center;gap:8px;margin-left:auto;flex-shrink:0;">
      <a href="./alumno.html?id=mqcxctmkrucidy326rn"
        style="background:rgba(201,168,76,.15);border:1.5px solid rgba(201,168,76,.5);border-radius:18px;padding:5px 12px;font-size:12px;font-weight:800;text-decoration:none;display:inline-flex;align-items:center;gap:5px;color:var(--gold);">🏋️ MI RUTINA</a>
      <div class="al-av" id="detail-av" style="width:44px;height:44px;font-size:18px;"></div>
    </div>
  </div>
  <div style="padding:0 16px 100px;" id="detail-body"></div>
</div>

<script>
// ══ FIREBASE ══════════════════════════════════════════════════════════
const CFG = {
  apiKey:'AIzaSyDkSgbqAJJRdlLwzcn-2vSMjVIUJbkVUGQ',
  authDomain:'entrenamiento-laboratorio.firebaseapp.com',
  projectId:'entrenamiento-laboratorio',
  storageBucket:'entrenamiento-laboratorio.firebasestorage.app',
  messagingSenderId:'399177627945',
  appId:'1:399177627945:web:2b4fef0894480f70dc1f38'
};

// ══ PIN ═══════════════════════════════════════════════════════════════
const COACH_PIN = '1234'; // ← Cambiá esto si querés otro PIN
let _pin = '';

function _pinKey(k) {
  if (k === 'del') { _pin = _pin.slice(0,-1); }
  else if (k === 'ok') { _checkPin(); return; }
  else { if (_pin.length >= 4) return; _pin += k; }
  _updDots();
  if (_pin.length === 4) setTimeout(_checkPin, 150);
}
function _updDots() {
  for (let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled', i < _pin.length);
}
function _checkPin() {
  if (_pin === COACH_PIN) {
    sessionStorage.setItem('CC_COACH','1');
    _showLoading();
    _initFirebase();
  } else {
    document.getElementById('pin-err').textContent = '❌ PIN incorrecto';
    _pin=''; _updDots();
    setTimeout(()=>document.getElementById('pin-err').textContent='', 1800);
  }
}
function _showLoading() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
}

// Auto-login si ya está autenticado en esta sesión
if (sessionStorage.getItem('CC_COACH')==='1') _showLoading();

// ══ DATA ═══════════════════════════════════════════════════════════════
let _alumnos=[], _planes=[], _antro=[], _fbAll={}, _coachEdits={}, _coachNotaGeneral={}, _sesionesCompletadas={};
let _db=null;

// DS: días del plan — ÍNDICES 0=Lun...6=Dom (igual que alumno.html)
const DS      = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];
const DS_FULL = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const MESES   = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

const _hoy = new Date();
// JS getDay(): 0=Dom,1=Lun,2=Mar,3=Mié,4=Jue,5=Vie,6=Sáb
// Plan dias[]:  0=Lun,1=Mar,2=Mié,3=Jue,4=Vie,5=Sáb,6=Dom
// Conversión: planIdx = (getDay() + 6) % 7
const _todayPlanIdx = (_hoy.getDay() + 6) % 7; // 0-6 dentro del plan
const _todayName    = DS_FULL[_todayPlanIdx];

// Asegura array aunque Firebase devuelva objeto/null
function _arr(v) { if (!v) return []; if (Array.isArray(v)) return v; return Object.values(v); }

// Retorna el array de sesiones de un día del plan: sem.dias[di][0].bloques
// sem.dias[di] es un array (puede ser object en Firebase); [0] es la primera sesión del día
function _daySession(sem, di) {
  const dias = _arr(sem.dias);
  const slot  = _arr(dias[di]);
  return slot[0] || null; // objeto {bloques:[...], nombre?:...}
}

async function _initFirebase() {
  try {
    if (!firebase.apps.length) firebase.initializeApp(CFG);
    _db = firebase.firestore();

    // Cargar backup principal (alumnos, planes, antropometría)
    const snap = await _db.collection('backups').doc('main').get();
    if (!snap.exists) { _showAppErr('Sin datos en la nube. Sincronizá desde la app del coach.'); return; }
    const d = snap.data();
    _alumnos = _arr(d.alumnos);
    _planes  = _arr(d.planificaciones);
    _antro   = _arr(d.antropometria);

    // Cargar feedback de cada alumno desde alumnos/{id}
    await Promise.all(_alumnos.filter(al=>al&&al.id).map(async al => {
      try {
        const s = await _db.collection('alumnos').doc(al.id).get();
        if (s.exists) {
          const sd = s.data();
          const fb = _arr(sd.feedbackHistorial);
          if (fb.length) _fbAll[al.id] = fb;
          if (sd.coachEdits)              _coachEdits[al.id]           = sd.coachEdits;
          if (sd.coachNotaGeneral)        _coachNotaGeneral[al.id]     = sd.coachNotaGeneral;
          if (sd.sesionesCompletadas)     _sesionesCompletadas[al.id]  = _arr(sd.sesionesCompletadas);
        }
      } catch(e){ console.warn('FB alumno '+al.id, e); }
    }));

    _render();
  } catch(err) {
    console.error('Coach init error:', err);
    _showAppErr('Error al conectar: '+err.message);
  }
}

function _showAppErr(msg) {
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pin-err').textContent='⚠️ '+msg;
}

function _render() {
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('app').style.display='flex';

  document.getElementById('hdr-dia').textContent  = _todayName.toUpperCase();
  document.getElementById('hdr-fecha').textContent = _hoy.getDate()+' de '+MESES[_hoy.getMonth()];

  renderHoy();
  renderSemana();
  renderAlumnos();
  renderFeedback();
}

// ══ TABS ═══════════════════════════════════════════════════════════════
function goTab(t) {
  ['hoy','semana','alumnos','feedback'].forEach(x=>{
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
    document.getElementById('nb-'+x).classList.toggle('on',x===t);
  });
}

// ══ HOY ════════════════════════════════════════════════════════════════
// Devuelve sesiones del día de hoy (planIdx) para un alumno
function _getSesionesHoy(alumnoId) {
  const res = [];
  for (const plan of _planes.filter(p=>p&&p.alumnoId===alumnoId)) {
    const sems = _arr(plan.semanasArray);
    for (let si=0; si<sems.length; si++) {
      const ses = _daySession(sems[si], _todayPlanIdx);
      if (ses && _arr(ses.bloques).length) {
        res.push({plan, semIdx:si, ses, semNombre:sems[si].nombre||'Semana '+(si+1)});
      }
    }
  }
  return res;
}

function renderHoy() {
  const ctn = document.getElementById('hoy-ctn');
  const conSesion = [];
  for (const al of _alumnos) {
    if (!al||!al.id) continue;
    const sesiones = _getSesionesHoy(al.id);
    if (sesiones.length) conSesion.push({al, sesiones});
  }

  if (!conSesion.length) {
    ctn.innerHTML=`<div class="empty"><div class="empty-ico">😴</div><div class="empty-ttl">Nadie entrena hoy</div><div class="empty-txt">No hay sesiones programadas para el ${_todayName}.</div></div>`;
    return;
  }

  let h=`<div class="sec-hdr">🏋️ Entrenan hoy — ${_todayName} · ${conSesion.length} alumno${conSesion.length!==1?'s':''}</div>`;

  for (const {al, sesiones} of conSesion) {
    const lastFb  = (_fbAll[al.id]||[]).slice(-1)[0];
    const fotoHTML = al.foto ? `<img src="${al.foto}">` : al.nombre.charAt(0);
    const {plan, ses, semNombre} = sesiones[0];
    const bloques = _arr(ses.bloques);

    h+=`<div class="al-card">
      <div class="al-card-hdr" onclick="_tog('hb_${al.id}','ha_${al.id}')">
        <div class="al-av">${fotoHTML}</div>
        <div style="flex:1;min-width:0;">
          <div class="al-nombre">${al.nombre}</div>
          <div class="al-sub">${plan.nombre||'Plan'} · ${semNombre}</div>
        </div>
        ${lastFb?'<div class="al-badge">💬 Feedback</div>':''}
        <span style="color:var(--muted);font-size:11px;margin-left:6px;" id="ha_${al.id}">▼</span>
      </div>
      <div class="al-body" id="hb_${al.id}" style="display:none;border-top:1px solid var(--border);padding-top:12px;">
        <div style="font-size:9px;font-weight:900;color:rgba(201,168,76,.7);letter-spacing:1px;margin-bottom:8px;">${DS[_todayPlanIdx]} — ${semNombre}</div>`;

    if (!bloques.length) {
      h+=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px;">Sin ejercicios</div>`;
    } else {
      for (const blq of bloques) {
        if (blq.nombre||blq.letra) {
          h+=`<div style="font-size:9px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin:8px 0 4px;">${blq.letra?blq.letra+'. ':''}${blq.nombre||''}</div>`;
        }
        h+=`<div class="ej-list">`;
        for (const ej of _arr(blq.ejercicios)) {
          const cs = ej.ctrlSeries||ej.ctrl?.series||ej.seriesArray?.length||ej.series?.length||'';
          const cr = ej.ctrlReps||ej.ctrl?.reps||ej.series?.[0]?.reps||'';
          const cp = ej.ctrlPeso||ej.ctrl?.peso||ej.series?.[0]?.peso||'';
          h+=`<div class="ej-item">
            <div class="ej-bullet"></div>
            <div class="ej-txt">${ej.nombre||'—'}</div>
            <div class="ej-det">${cs?cs+'×':''} ${cr||'—'} ${cp?'· '+cp+' kg':''}</div>
          </div>`;
        }
        h+=`</div>`;
      }
    }

    h+=`<button onclick="openDetail('${al.id}',${_todayPlanIdx})" style="width:100%;margin-top:14px;background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.25);color:var(--gold);border-radius:12px;padding:11px;font-size:12px;font-weight:800;cursor:pointer;letter-spacing:.3px;">Ver perfil completo →</button>
      </div>
    </div>`;
  }

  ctn.innerHTML=h;
}

function _tog(bodyId,arrId) {
  const b=document.getElementById(bodyId);
  const a=document.getElementById(arrId);
  if (!b) return;
  const open=b.style.display!=='none';
  b.style.display=open?'none':'block';
  if (a) a.textContent=open?'▼':'▲';
}

// ══ SEMANA ═════════════════════════════════════════════════════════════
function renderSemana() {
  const ctn=document.getElementById('semana-ctn');

  // diaMap[planDayIdx][alId] = al
  const diaMap={};
  for (const al of _alumnos) {
    if (!al||!al.id) continue;
    for (const plan of _planes.filter(p=>p&&p.alumnoId===al.id)) {
      for (const sem of _arr(plan.semanasArray)) {
        for (let di=0;di<7;di++) {
          const ses = _daySession(sem, di);
          if (ses && _arr(ses.bloques).length) {
            if (!diaMap[di]) diaMap[di]={};
            diaMap[di][al.id]=al;
          }
        }
      }
    }
  }

  let h=`<div class="sec-hdr">📅 Distribución semanal</div><div class="sem-grid">`;
  for (let di=0;di<7;di++) {
    const isHoy = di===_todayPlanIdx;
    const als   = Object.values(diaMap[di]||{});
    h+=`<div class="sem-col${isHoy?' hoy':''}">
      <div class="sem-col-hdr">${DS[di]}</div>`;
    if (!als.length) {
      h+=`<div style="padding:4px;text-align:center;font-size:9px;color:rgba(255,255,255,.08);">·</div>`;
    } else {
      for (const al of als) {
        h+=`<div class="sem-chip" onclick="openDetail('${al.id}')">${al.nombre.split(' ')[0]}</div>`;
      }
    }
    h+=`</div>`;
  }
  h+=`</div>`;

  // Resumen por alumno
  h+=`<div class="sec-hdr">Días por alumno</div>`;
  const sortedAls = [..._alumnos].filter(a=>a&&a.id).sort((a,b)=>{
    const ca=Object.values(diaMap).filter(m=>m[a.id]).length;
    const cb=Object.values(diaMap).filter(m=>m[b.id]).length;
    return cb-ca;
  });
  for (const al of sortedAls) {
    const diasAl=[...Array(7)].map((_,di)=>di).filter(di=>diaMap[di]?.[al.id]).map(di=>DS[di]);
    if (!diasAl.length) continue;
    h+=`<div class="al-card" onclick="openDetail('${al.id}')">
      <div class="al-card-hdr">
        <div class="al-av">${al.foto?`<img src="${al.foto}">`:al.nombre.charAt(0)}</div>
        <div style="flex:1;">
          <div class="al-nombre">${al.nombre}</div>
          <div class="al-sub">${diasAl.join(' · ')}</div>
        </div>
        <div style="font-size:22px;font-weight:900;color:var(--gold);">${diasAl.length}</div>
      </div>
    </div>`;
  }

  ctn.innerHTML=h;
}

// ══ ALUMNOS ════════════════════════════════════════════════════════════
function renderAlumnos(q='') {
  const ctn=document.getElementById('alumnos-ctn');
  const all=_alumnos.filter(a=>a&&a.id);
  const als=q ? all.filter(a=>a.nombre.toLowerCase().includes(q.toLowerCase())) : all;

  let h=`<input class="al-search" type="search" placeholder="🔍 Buscar alumno..." value="${q}"
    oninput="renderAlumnos(this.value)" autocomplete="off">`;

  if (!als.length) {
    h+=`<div class="empty"><div class="empty-ico">${q?'🔍':'👥'}</div><div class="empty-ttl">${q?'Sin resultados':'Sin alumnos'}</div></div>`;
  } else {
    h+=`<div style="font-size:9px;font-weight:900;color:var(--muted);letter-spacing:1px;margin-bottom:10px;">${als.length} ALUMNO${als.length!==1?'S':''}</div>`;
    for (const al of als) {
      const np=_planes.filter(p=>p&&p.alumnoId===al.id).length;
      const nfb=(_fbAll[al.id]||[]).length;
      const nsc=(_sesionesCompletadas[al.id]||[]).length;
      h+=`<div class="al-card" onclick="openDetail('${al.id}')">
        <div class="al-card-hdr">
          <div class="al-av" style="width:50px;height:50px;font-size:20px;">${al.foto?`<img src="${al.foto}">`:al.nombre.charAt(0)}</div>
          <div style="flex:1;min-width:0;">
            <div class="al-nombre">${al.nombre}</div>
            <div class="al-sub">${[al.objetivo,al.nivel].filter(Boolean).join(' · ')||'Sin objetivo registrado'}</div>
            <div class="al-sub" style="margin-top:3px;">${np} plan${np!==1?'es':''} ${nfb?'· '+nfb+' fb':''} ${nsc?'· '+nsc+' ses.':''}</div>
          </div>
          <div style="font-size:20px;color:var(--muted);">›</div>
        </div>
      </div>`;
    }
  }
  ctn.innerHTML=h;
}

// ══ FEEDBACK ═══════════════════════════════════════════════════════════
function renderFeedback() {
  const ctn=document.getElementById('feedback-ctn');
  const all=[];
  for (const [alId,fbs] of Object.entries(_fbAll)) {
    const al=_alumnos.find(a=>a.id===alId);
    if (!al) continue;
    for (const fb of fbs) all.push({al,fb});
  }

  if (!all.length) {
    ctn.innerHTML=`<div class="empty"><div class="empty-ico">💬</div><div class="empty-ttl">Sin feedback todavía</div><div class="empty-txt">Los alumnos aún no enviaron feedback post-entrenamiento.</div></div>`;
    return;
  }

  all.sort((a,b)=>new Date(b.fb.fecha||0)-new Date(a.fb.fecha||0));

  let h=`<div class="sec-hdr">💬 ${all.length} feedbacks recibidos</div>`;
  for (const {al,fb} of all) {
    const fecha=fb.fecha?new Date(fb.fecha).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}):'—';
    h+=`<div class="fb-card">
      <div class="fb-card-hdr">
        <div class="al-av" style="width:38px;height:38px;font-size:15px;">${al.foto?`<img src="${al.foto}">`:al.nombre.charAt(0)}</div>
        <div style="flex:1;">
          <div class="fb-alumno">${al.nombre}</div>
          <div class="fb-fecha">${fecha}${fb.sesion?' · '+fb.sesion:''}</div>
        </div>
      </div>
      <div class="fb-metrics">`;

    const mets=[['Energía','energia'],['Estrés','estres'],['Motivación','motivacion'],
                ['Dolor','dolor'],['Recuperación','recuperacion'],['Pump','pump'],['Volumen','volumen']];
    for (const [lbl,k] of mets) {
      if (fb[k]!==undefined&&fb[k]!=='') h+=`<div class="fb-met"><span class="fb-met-lbl">${lbl}</span><span class="fb-met-val">${fb[k]}</span></div>`;
    }
    if (fb['sueño_h']) h+=`<div class="fb-met"><span class="fb-met-lbl">Sueño</span><span class="fb-met-val">${fb['sueño_h']}h</span></div>`;
    if (fb['sueño_q']) h+=`<div class="fb-met"><span class="fb-met-lbl">Calidad</span><span class="fb-met-val">${fb['sueño_q']}/10</span></div>`;
    h+=`</div>`;
    if (fb.obs) h+=`<div class="fb-obs">"${fb.obs}"</div>`;
    h+=`</div>`;
  }
  ctn.innerHTML=h;
}

// ══ DETAIL OVERLAY ═════════════════════════════════════════════════════
// Estado del detalle
let _det = { alId:null, planIdx:0, weekIdx:0, dayIdx:0 };

function openDetail(alId, dayIdx) {
  const al = _alumnos.find(a=>a.id===alId);
  if (!al) return;
  const planes = _planes.filter(p=>p&&p.alumnoId===alId);
  _det = {
    alId,
    planIdx: Math.max(0, planes.length-1),
    weekIdx: 0,
    dayIdx: (dayIdx !== undefined) ? dayIdx : _todayPlanIdx
  };
  document.getElementById('detail-nombre').textContent = al.nombre;
  document.getElementById('detail-av').innerHTML = al.foto ? `<img src="${al.foto}">` : al.nombre.charAt(0);
  document.getElementById('detail-body').innerHTML = _buildDetailHTML();
  document.getElementById('al-detail').style.display = 'flex';
  document.getElementById('al-detail').scrollTop = 0;
}

function closeDetail() {
  document.getElementById('al-detail').style.display='none';
}

function _buildDetailHTML() {
  const al     = _alumnos.find(a=>a.id===_det.alId);
  if (!al) return '';
  const planes = _planes.filter(p=>p&&p.alumnoId===_det.alId);
  const plan   = planes[_det.planIdx];
  const sems   = plan ? _arr(plan.semanasArray) : [];
  const sem    = sems[_det.weekIdx];
  const antro  = _antro.filter(r=>r&&r.alumnoId===_det.alId).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const fbs    = (_fbAll[_det.alId]||[]).sort((a,b)=>new Date(a.fecha)-new Date(b.fecha));
  const waLink = _waLink(al.telefono);
  let h = '';

  // ── Mini perfil + WhatsApp
  h += `<div style="display:flex;align-items:center;gap:12px;padding:4px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px;">
    <div class="al-av" style="width:54px;height:54px;font-size:21px;flex-shrink:0;">${al.foto?`<img src="${al.foto}">`:al.nombre.charAt(0)}</div>
    <div style="flex:1;min-width:0;">
      <div style="font-size:17px;font-weight:900;color:var(--text);line-height:1.2;">${al.nombre}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px;">${[al.objetivo,al.nivel].filter(Boolean).join(' · ')||''}</div>
      ${al.lesiones?`<div style="font-size:10px;color:#f87171;margin-top:3px;">⚠️ ${al.lesiones}</div>`:''}
    </div>
    ${waLink?`<a href="${waLink}" target="_blank" class="wa-btn" title="WhatsApp"><svg viewBox="0 0 24 24" fill="currentColor" width="20" height="20"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.093.541 4.061 1.487 5.773L0 24l6.392-1.673A11.955 11.955 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.779 9.779 0 01-5.032-1.399l-.361-.214-3.741.979.997-3.645-.235-.374A9.784 9.784 0 012.182 12c0-5.42 4.398-9.818 9.818-9.818 5.42 0 9.818 4.398 9.818 9.818 0 5.42-4.398 9.818-9.818 9.818z"/></svg></a>`:''}
  </div>`;

  // ── Nota general del coach (siempre visible arriba)
  const notaGeneral = _coachNotaGeneral[_det.alId] || '';
  h += `<div class="sec-hdr" style="margin-top:0;">📋 Notas del coach</div>
  <textarea class="nota-inp${notaGeneral?' has-nota':''}" rows="2"
    placeholder="Observaciones generales, lesiones, preferencias, restricciones..."
    onblur="_saveNotaGeneral('${_det.alId}',this.value)"
    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
    >${notaGeneral}</textarea>`;

  // ── SESIÓN
  if (sems.length) {
    h += `<div style="height:1px;background:var(--border);margin:16px 0;"></div>`;

    // Selector de plan (si hay múltiples)
    if (planes.length > 1) {
      h += `<div style="display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;scrollbar-width:none;">`;
      for (let pi=0;pi<planes.length;pi++) {
        h += `<button class="plan-chip${pi===_det.planIdx?' active':''}" onclick="_detPlan(${pi})">${planes[pi].nombre||'Plan '+(pi+1)}</button>`;
      }
      h += `</div>`;
    }

    h += `<div style="font-size:9px;font-weight:900;color:var(--gold);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:10px;">${plan.nombre||'Plan de entrenamiento'}</div>`;

    // Tabs de días
    h += `<div class="day-tabs">`;
    for (let di=0;di<7;di++) {
      const hasSes=sems.some(s=>{const ses=_daySession(s,di);return ses&&_arr(ses.bloques).length;});
      h += `<button class="day-tab${hasSes?' has':' no'}${di===_det.dayIdx?' active':''}" onclick="${hasSes?`_detDay(${di})`:'void(0)'}">${DS[di]}</button>`;
    }
    h += `</div>`;

    // Nav de semanas
    if (sems.length > 1) {
      h += `<div class="week-nav">
        <button class="wnav-btn" onclick="_detWeek(-1)"${_det.weekIdx===0?' disabled':''}>‹</button>
        <div class="wnav-lbl">${sem?.nombre||'Semana '+(_det.weekIdx+1)}<br><span style="opacity:.6;font-size:9px;">${sems.length} semanas</span></div>
        <button class="wnav-btn" onclick="_detWeek(1)"${_det.weekIdx===sems.length-1?' disabled':''}>›</button>
      </div>`;
    }

    // Sesión
    h += `<div id="det-ses">${_buildSesionHTML(sem, _det.dayIdx)}</div>`;

    // Botón finalizar sesión
    const sesTieneEjercicios = !!_daySession(sem, _det.dayIdx);
    if (sesTieneEjercicios) {
      const yaCompletada = _sesionYaCompletada(_det.alId, _det.dayIdx);
      h += `<button id="fin-btn" onclick="_finalizarSesion('${_det.alId}')"
        style="width:100%;margin-top:14px;padding:14px;border-radius:14px;font-size:13px;font-weight:900;letter-spacing:.3px;cursor:pointer;transition:all .2s;border:none;
        ${yaCompletada?'background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);cursor:default;':'background:var(--gold);color:#0d0d1a;'}"
        ${yaCompletada?'disabled':''}>
        ${yaCompletada?'✓ Sesión completada hoy':'✓ Finalizar sesión de hoy'}
      </button>`;
    }

    h += `<div style="height:1px;background:var(--border);margin:20px 0;"></div>`;
  }

  // ── Historial de sesiones completadas
  h += _buildHistorialHTML(_det.alId);

  // ── Registrar medición rápida
  h += `<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;cursor:pointer;" onclick="_togMedForm()">
    <div class="sec-hdr" style="margin:0;">📏 Registrar medición</div>
    <span style="color:var(--gold);font-size:22px;font-weight:300;line-height:1;" id="med-tog">+</span>
  </div>
  <div id="med-form" style="display:none;margin-top:10px;background:var(--card);border-radius:12px;padding:14px 16px;">
    <div style="display:flex;gap:10px;align-items:flex-end;">
      <div style="flex:1;">
        <div style="font-size:9px;color:var(--muted);font-weight:900;letter-spacing:.8px;margin-bottom:5px;">PESO CORPORAL</div>
        <input type="number" id="med-peso" placeholder="82.5" step="0.1"
          style="width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 12px;font-size:15px;font-weight:700;font-family:inherit;">
      </div>
      <div>
        <div style="font-size:9px;color:var(--muted);font-weight:900;letter-spacing:.8px;margin-bottom:5px;">KG</div>
        <div style="font-size:15px;font-weight:800;color:var(--muted);padding:9px 8px;">kg</div>
      </div>
    </div>
    <button onclick="_saveMedicion('${_det.alId}')"
      style="width:100%;margin-top:10px;background:var(--gold);color:#0d0d1a;border:none;border-radius:10px;padding:12px;font-size:12px;font-weight:900;cursor:pointer;">
      Guardar medición
    </button>
  </div>`;

  // ── Datos personales
  h += `<div class="sec-hdr" style="margin-top:20px;">👤 Datos personales</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;">`;
  for (const [lbl,val] of [['Objetivo',al.objetivo],['Nivel',al.nivel],['Inicio',al.inicio],['Días/sem.',al.dias],['Teléfono',al.telefono],['Email',al.email]]) {
    if (!val) continue;
    h+=`<div style="background:var(--card);border-radius:10px;padding:10px 12px;">
      <div style="font-size:8px;color:var(--muted);font-weight:900;text-transform:uppercase;letter-spacing:.8px;">${lbl}</div>
      <div style="font-size:12px;color:var(--text);font-weight:700;margin-top:3px;">${val}</div>
    </div>`;
  }
  h += `</div>`;
  if (al.lesiones) h+=`<div style="background:rgba(248,113,113,.07);border-left:3px solid #f87171;border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:10px;font-size:11px;color:#f87171;line-height:1.4;">⚠️ <strong>Lesiones:</strong> ${al.lesiones}</div>`;
  if (al.observaciones) h+=`<div style="background:rgba(255,255,255,.03);border-left:3px solid var(--border);border-radius:0 10px 10px 0;padding:10px 14px;margin-bottom:10px;font-size:11px;color:var(--muted);line-height:1.4;">📝 ${al.observaciones}</div>`;

  // ── Últimas mediciones
  if (antro.length) {
    const last = antro[antro.length-1];
    h += `<div class="sec-hdr">📊 Última medición — ${last.fecha||'—'}</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;">`;
    for (const [lbl,k,u] of [['Peso','peso','kg'],['Grasa','grasa','%'],['Músculo','musculo','%'],['Cintura','cintura','cm'],['Cadera','cadera','cm'],['Brazo','brazo','cm']]) {
      if (!last[k]) continue;
      h+=`<div class="stat-mini"><div class="stat-mini-lbl">${lbl}</div><div class="stat-mini-val">${last[k]}<span class="stat-mini-u"> ${u}</span></div></div>`;
    }
    h += `</div>`;
    const pesoData=antro.filter(r=>r.peso&&parseFloat(r.peso)>0);
    if (pesoData.length>=2) {
      const delta=+(parseFloat(pesoData[pesoData.length-1].peso)-parseFloat(pesoData[0].peso)).toFixed(1);
      h+=`<div style="background:var(--card);border-radius:12px;padding:12px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;">
        <div style="flex:1;font-size:12px;color:var(--muted);">Variación de peso (${pesoData.length} mediciones)</div>
        <div style="font-size:18px;font-weight:900;color:${delta<0?'var(--green)':delta>0?'#f87171':'var(--muted)'};">${delta>0?'+':''}${delta} kg</div>
      </div>`;
    }
  }

  // ── Feedback reciente
  if (fbs.length) {
    h += `<div class="sec-hdr">💬 Últimos ${Math.min(fbs.length,3)} feedbacks</div>`;
    for (const fb of fbs.slice(-3).reverse()) {
      const fecha=fb.fecha?new Date(fb.fecha).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short'}):'—';
      h += `<div class="fb-card" style="margin-bottom:8px;">
        <div style="font-size:10px;color:var(--muted);margin-bottom:8px;font-weight:700;">${fecha}${fb.sesion?' · '+fb.sesion:''}</div>
        <div class="fb-metrics">`;
      for (const [lbl,k] of [['Energía','energia'],['Estrés','estres'],['Motivación','motivacion'],['Dolor','dolor'],['Recuperación','recuperacion'],['Pump','pump']]) {
        if (fb[k]!==undefined&&fb[k]!=='') h+=`<div class="fb-met"><span class="fb-met-lbl">${lbl}</span><span class="fb-met-val">${fb[k]}</span></div>`;
      }
      h += `</div>`;
      if (fb.obs) h += `<div class="fb-obs">"${fb.obs}"</div>`;
      h += `</div>`;
    }
  }

  return h;
}

// ── WhatsApp helper
function _waLink(tel) {
  if (!tel) return null;
  const d = String(tel).replace(/\D/g,'');
  const n = d.startsWith('549') ? d : d.startsWith('54') ? d : '549'+d;
  return `https://wa.me/${n}`;
}

// ── Selector de plan
function _detPlan(pi) {
  _det.planIdx = pi; _det.weekIdx = 0;
  document.getElementById('detail-body').innerHTML = _buildDetailHTML();
}

// ── Sesión ya completada hoy?
function _sesionYaCompletada(alId, dayIdx) {
  const hoy = new Date().toISOString().split('T')[0];
  return (_sesionesCompletadas[alId]||[]).some(s =>
    s.fecha?.startsWith(hoy) && s.dayIdx===dayIdx && s.planIdx===_det.planIdx && s.weekIdx===_det.weekIdx
  );
}

// ── Finalizar sesión
async function _finalizarSesion(alId) {
  const edits = _coachEdits[alId] || {};
  const pfxBase = `${_det.planIdx}_${_det.weekIdx}_${_det.dayIdx}`;
  const sesEdits = {};
  for (const [k,v] of Object.entries(edits)) {
    if (k.includes('_'+pfxBase+'_') || k.endsWith('_'+pfxBase)) sesEdits[k]=v;
  }
  const record = {
    fecha: new Date().toISOString(),
    planIdx: _det.planIdx,
    weekIdx: _det.weekIdx,
    dayIdx: _det.dayIdx,
    dia: DS_FULL[_det.dayIdx],
    edits: sesEdits
  };
  try {
    await _db.collection('alumnos').doc(alId).update({
      sesionesCompletadas: firebase.firestore.FieldValue.arrayUnion(record)
    });
    if (!_sesionesCompletadas[alId]) _sesionesCompletadas[alId]=[];
    _sesionesCompletadas[alId].push(record);
    const btn = document.getElementById('fin-btn');
    if (btn) {
      btn.textContent='✓ Sesión completada hoy';
      btn.disabled=true;
      btn.style.cssText='width:100%;margin-top:14px;padding:14px;border-radius:14px;font-size:13px;font-weight:900;cursor:default;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:var(--green);';
    }
    _showToast('✓ Sesión registrada');
  } catch(e) { console.error(e); }
}

// ── Nota general del coach por alumno
async function _saveNotaGeneral(alId, val) {
  _coachNotaGeneral[alId] = val;
  const el = event?.target;
  if (el) el.classList.toggle('has-nota', !!val);
  try {
    await _db.collection('alumnos').doc(alId).set({ coachNotaGeneral: val }, { merge: true });
    _showToast('✓ Nota guardada');
  } catch(e) { console.error(e); }
}

// ── Historial de sesiones completadas
function _buildHistorialHTML(alId) {
  const scs = (_sesionesCompletadas[alId]||[]).slice().reverse().slice(0,8);
  if (!scs.length) return '';
  let h = `<div class="sec-hdr">📅 Historial de sesiones — ${scs.length} completadas</div>`;
  for (const s of scs) {
    const fecha = new Date(s.fecha).toLocaleDateString('es-AR',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    const nPesos = Object.keys(s.edits||{}).filter(k=>k.startsWith('w_')).length;
    const nNotas = Object.keys(s.edits||{}).filter(k=>k.startsWith('n_')).filter(k=>(s.edits||{})[k]).length;
    h += `<div class="ses-hist-item">
      <div class="shi-check">✓</div>
      <div style="flex:1;">
        <div style="font-size:13px;font-weight:800;color:var(--text);">${s.dia||DS_FULL[s.dayIdx]||'—'}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;">${fecha}${nPesos?' · '+nPesos+' peso'+(nPesos!==1?'s':'')+'':''} ${nNotas?' · '+nNotas+' nota'+(nNotas!==1?'s':''):''}
        </div>
      </div>
    </div>`;
  }
  return h + `<div style="height:1px;background:var(--border);margin:6px 0 16px;"></div>`;
}

// ── Medición rápida
function _togMedForm() {
  const f=document.getElementById('med-form');
  const t=document.getElementById('med-tog');
  if (!f) return;
  const open=f.style.display!=='none';
  f.style.display=open?'none':'block';
  if (t) t.textContent=open?'+':'−';
  if (!open) setTimeout(()=>document.getElementById('med-peso')?.focus(),100);
}

async function _saveMedicion(alId) {
  const pesoEl=document.getElementById('med-peso');
  const peso=pesoEl?.value?.trim();
  if (!peso) { pesoEl?.focus(); return; }
  const record = { fecha: new Date().toISOString().split('T')[0], peso };
  try {
    await _db.collection('alumnos').doc(alId).update({
      antropometria: firebase.firestore.FieldValue.arrayUnion(record)
    });
    _antro.push({...record, alumnoId: alId});
    if (pesoEl) pesoEl.value='';
    _togMedForm();
    _showToast(`✓ ${peso} kg registrado`);
  } catch(e) { console.error(e); }
}

// ── Toast de confirmación
function _showToast(msg) {
  const t=document.getElementById('save-toast');
  if (!t) return;
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ── Reload completo de datos
function _reload() {
  _alumnos=[]; _planes=[]; _antro=[]; _fbAll={}; _coachEdits={}; _coachNotaGeneral={}; _sesionesCompletadas={};
  document.getElementById('app').style.display='none';
  document.getElementById('loading-screen').style.display='flex';
  _initFirebase();
}

// Tap en un día
function _detDay(di) {
  _det.dayIdx = di;
  document.querySelectorAll('.day-tab').forEach((btn, i) => {
    btn.classList.toggle('active', i === di);
  });
  const planes = _planes.filter(p=>p&&p.alumnoId===_det.alId);
  const plan   = planes[_det.planIdx];
  const sems   = _arr(plan?.semanasArray||[]);
  document.getElementById('det-ses').innerHTML = _buildSesionHTML(sems[_det.weekIdx], di);
}

// Cambio de semana
function _detWeek(dir) {
  const planes = _planes.filter(p=>p&&p.alumnoId===_det.alId);
  const plan   = planes[_det.planIdx];
  const sems   = _arr(plan?.semanasArray||[]);
  const ni = _det.weekIdx + dir;
  if (ni < 0 || ni >= sems.length) return;
  _det.weekIdx = ni;
  document.getElementById('detail-body').innerHTML = _buildDetailHTML();
}

// HTML de la sesión de un día — con índices para edición
function _buildSesionHTML(sem, di) {
  if (!sem) return `<div class="empty-day">Sin semana disponible</div>`;
  const ses = _daySession(sem, di);
  if (!ses || !_arr(ses.bloques).length) {
    return `<div class="empty-day">😴 Sin sesión para el ${DS_FULL[di]}</div>`;
  }
  const bloques = _arr(ses.bloques);
  let h = '<div style="padding:2px 0 6px;">';
  for (let bi=0; bi<bloques.length; bi++) {
    const blq = bloques[bi];
    const ejercicios = _arr(blq.ejercicios);
    if (!ejercicios.length) continue;
    h += `<div class="blq">`;
    if (blq.letra || blq.nombre) {
      h += `<div class="blq-hdr">
        ${blq.letra?`<div class="blq-letra">${blq.letra}</div>`:''}
        <div class="blq-nombre">${blq.nombre||blq.tipo||''}</div>
      </div>`;
    }
    for (let ei=0; ei<ejercicios.length; ei++) {
      h += _buildEjHTML(ejercicios[ei], di, bi, ei);
    }
    h += `</div>`;
  }
  return h + '</div>';
}

// HTML de un ejercicio — pesos editables + nota del coach
function _buildEjHTML(ej, dayIdx, blkIdx, ejIdx) {
  const alId   = _det.alId;
  const edits  = _coachEdits[alId] || {};
  const pfx    = `${_det.planIdx}_${_det.weekIdx}_${dayIdx}_${blkIdx}_${ejIdx}`;
  const noteKey = `n_${pfx}`;
  const note   = edits[noteKey] || '';

  const cs   = ej.ctrlSeries || ej.ctrl?.series || '';
  const cr   = ej.ctrlReps   || ej.ctrl?.reps   || '';
  const cp   = String(ej.ctrlPeso   || ej.ctrl?.peso   || '');
  const crir = ej.ctrlRIR    || ej.ctrl?.rir    || '';

  // Series reales del plan; si no existen, generamos N filas sintéticas desde ctrlSeries
  let series = _arr(ej.seriesArray || ej.series || []);
  const nCtrl = parseInt(cs) || 0;
  if (!series.length && nCtrl > 0) {
    // Generar filas sintéticas para poder editar pesos
    series = Array.from({length: nCtrl}, () => ({reps: cr, peso: cp, rir: crir}));
  }

  const ctrl = [cs?cs+' series':'', cr?'× '+cr:'', cp?cp+' kg':'', crir?'RIR '+crir:''].filter(Boolean).join(' · ');

  let h = `<div class="ejc">
    <div class="ejc-nombre">${ej.nombre||'—'}</div>`;
  if (ctrl) h += `<div class="ejc-ctrl">${ctrl}</div>`;

  if (series.length) {
    h += `<table class="st"><tr><th>#</th><th>REPS</th><th>PESO (kg)</th><th>RIR</th></tr>`;
    for (let si=0; si<series.length; si++) {
      const s    = series[si];
      const isA  = s.tipo==='A' || s.tipo==='aprox';
      const reps = (s.reps !== undefined && s.reps !== '') ? s.reps : (cr||'—');
      const rir  = (s.rir  !== undefined && s.rir  !== '') ? s.rir  : (crir||'—');
      const wKey = `w_${pfx}_${si}`;
      const editedP = edits[wKey];
      // Base: peso editado por coach → peso de la serie → ctrlPeso del plan
      const baseP   = (s.peso !== undefined && s.peso !== '') ? String(s.peso) : cp;
      const showP   = editedP !== undefined && editedP !== '' ? editedP : baseP;
      const isEdited = editedP !== undefined && editedP !== '';
      h += `<tr${isA?' class="aprox"':''}>
        <td>${si+1}${isA?` <small style="color:var(--gold);font-size:8px">A</small>`:''}</td>
        <td>${reps}</td>
        <td style="padding:3px 5px;">
          <input type="number" step="0.5" class="peso-inp${isEdited?' edited':''}"
            value="${showP}" placeholder="${baseP||'—'}"
            onblur="_cw('${alId}','${wKey}',this.value,this)"
            onclick="this.select()">
        </td>
        <td>${rir}</td>
      </tr>`;
    }
    h += `</table>`;
  }

  // Nota del coach
  h += `<textarea class="nota-inp${note?' has-nota':''}" rows="1"
    placeholder="📝 Nota — cambios, sustituciones, observaciones..."
    onblur="_cn('${alId}','${noteKey}',this.value)"
    oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
    style="height:${note?'auto':'34px'}"
    >${note}</textarea>`;

  return h + `</div>`;
}

// ══ GUARDAR EDICIONES DEL COACH ═════════════════════════════════════
let _savePending = {}, _saveT = null;

function _cw(alId, key, val, el) {
  if (!_coachEdits[alId]) _coachEdits[alId] = {};
  _coachEdits[alId][key] = val;
  el.classList.add('edited');
  _queueSave(alId, key, val);
}

function _cn(alId, key, val) {
  if (!_coachEdits[alId]) _coachEdits[alId] = {};
  _coachEdits[alId][key] = val;
  const el = event?.target;
  if (el) el.classList.toggle('has-nota', !!val);
  _queueSave(alId, key, val);
}

function _queueSave(alId, key, val) {
  if (!_savePending[alId]) _savePending[alId] = {};
  _savePending[alId][key] = val;
  clearTimeout(_saveT);
  _saveT = setTimeout(async () => {
    const pending = {..._savePending};
    _savePending = {};
    for (const [aid, edits] of Object.entries(pending)) {
      try {
        await _db.collection('alumnos').doc(aid).set(
          { coachEdits: edits }, { merge: true }
        );
      } catch(e) { console.warn('Coach save error:', aid, e); }
    }
    _showToast('✓ Guardado');
  }, 1000);
}

// Auto-init si ya estaba autenticado
if (sessionStorage.getItem('CC_COACH')==='1') {
  if (document.readyState==='loading') document.addEventListener('DOMContentLoaded',_initFirebase);
  else _initFirebase();
}

// PWA — Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./coach-sw.js').catch(()=>{});
  });
}
</script>

</html>
