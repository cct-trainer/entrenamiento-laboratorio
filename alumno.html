<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Mi Portal — Christian Cattaneo</title>
<link rel="manifest" id="pwa-manifest">
<meta name="theme-color" content="#C9A84C">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="C. Cattaneo">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d1a;--card:#13132a;--card2:#1a1a38;
  --gold:#C9A84C;--gold-d:#9A7A28;--green:#22c55e;
  --text:#e8e8f0;--muted:#8888aa;--border:rgba(255,255,255,.08);
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}

#loading,#error-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:14px;padding:24px;text-align:center;}
#error-screen{display:none;}
.spinner{width:36px;height:36px;border:3px solid rgba(201,168,76,.2);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

#app{display:none;flex-direction:column;max-width:480px;margin:0 auto;min-height:100vh;}

.hdr{background:linear-gradient(180deg,#1a1a3a 0%,transparent 100%);padding:28px 20px 16px;}
.hdr-row{display:flex;align-items:center;gap:14px;}
.avatar{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,#C9A84C,#7a5a10);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;flex-shrink:0;}
.alumno-nombre{font-size:20px;font-weight:900;color:#fff;line-height:1.1;}
.plan-badge{font-size:10px;font-weight:700;color:var(--gold);letter-spacing:.5px;margin-top:3px;}
.coach-tag{font-size:10px;color:var(--muted);margin-top:1px;}

.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#13132a;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);}
.nb{flex:1;padding:10px 4px 14px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:9px;font-weight:800;letter-spacing:.6px;}
.nb svg{width:22px;height:22px;stroke-width:1.8;}
.nb.on{color:var(--gold);}

.tab{padding:12px 16px 90px;display:none;}
.tab.on{display:block;}

.snav{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.snav-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:18px;line-height:1;}
.snav-btn:disabled{opacity:.25;cursor:default;}
.snav-info{text-align:center;}
.snav-num{font-size:12px;font-weight:900;color:var(--gold);}
.snav-dates{font-size:9px;color:var(--muted);margin-top:1px;}

.slabel{font-size:9px;font-weight:800;letter-spacing:1px;color:var(--muted);margin-bottom:8px;}
.dgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:14px;}
.dchip{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;background:var(--card);border:1.5px solid var(--border);cursor:pointer;transition:all .15s;position:relative;user-select:none;}
.dchip.has{border-color:rgba(201,168,76,.4);}
.dchip.on{background:var(--gold);border-color:var(--gold);}
.dchip.today{box-shadow:0 0 0 2px rgba(34,197,94,.35);border-color:var(--green);}
.dchip .dl{font-size:8px;font-weight:800;color:var(--muted);letter-spacing:.5px;}
.dchip.has .dl{color:var(--gold);}
.dchip.on .dl{color:rgba(255,255,255,.65);}
.dchip .dn{font-size:14px;font-weight:900;color:var(--text);}
.dchip.on .dn{color:#fff;}
.dchip.no{opacity:.3;pointer-events:none;}
.ddot{position:absolute;top:4px;right:4px;width:5px;height:5px;background:var(--gold);border-radius:50%;}

.scard{background:var(--card);border-radius:14px;padding:16px;margin-bottom:14px;}
.scard-name{font-size:13px;font-weight:900;color:var(--gold);margin-bottom:12px;letter-spacing:.3px;}
.blk{margin-bottom:10px;}
.blk-hdr{display:flex;align-items:center;gap:8px;padding:7px 10px;background:rgba(255,255,255,.04);border-radius:8px;margin-bottom:2px;cursor:pointer;}
.blk-letra{width:20px;height:20px;background:var(--gold);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:#0d0d1a;flex-shrink:0;}
.blk-txt{flex:1;}
.blk-n{font-size:11px;font-weight:800;color:var(--text);}
.blk-t{font-size:9px;color:var(--muted);}
.blk-arr{margin-left:auto;font-size:9px;color:var(--muted);transition:transform .2s;}
.blk-hdr.open .blk-arr{transform:rotate(180deg);}
.blk-body{padding:0 2px 4px;}

.ejrow{display:flex;align-items:flex-start;gap:8px;padding:7px 8px;border-radius:7px;}
.ejrow:nth-child(odd){background:rgba(255,255,255,.025);}
.ej-n{font-size:12px;font-weight:600;color:var(--text);flex:1;line-height:1.3;}
.ej-c{text-align:right;flex-shrink:0;}
.cp{display:inline-block;background:rgba(201,168,76,.14);color:var(--gold);border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;margin-bottom:2px;}
.cr{display:inline-block;background:rgba(34,197,94,.14);color:var(--green);border-radius:4px;padding:2px 6px;font-size:9px;font-weight:700;}
.ej-rir{font-size:9px;color:#555;margin-top:2px;}

.ccard{background:var(--card);border-radius:12px;padding:14px 16px;margin-bottom:9px;}
.ccard-n{font-size:12px;font-weight:800;color:var(--text);margin-bottom:8px;}
.sparkrow{display:flex;align-items:flex-end;gap:3px;height:42px;}
.spark-grp{flex:1;display:flex;gap:1px;align-items:flex-end;height:42px;}
.sp-bar{flex:1;border-radius:2px 2px 0 0;min-height:3px;}
.sp-plan{background:rgba(201,168,76,.35);border:1px solid rgba(201,168,76,.6);}
.sp-real{background:rgba(34,197,94,.5);border:1px solid rgba(34,197,94,.7);}
.spark-labels{display:flex;gap:3px;margin-top:3px;}
.spark-lbl{flex:1;text-align:center;font-size:8px;color:var(--muted);font-weight:700;}
.legend-row{display:flex;gap:12px;margin-bottom:12px;font-size:9px;font-weight:700;color:var(--muted);align-items:center;}
.leg-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0;}

.mcard{background:var(--card);border-radius:12px;padding:13px 16px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.micon{font-size:22px;flex-shrink:0;}
.mlabel{font-size:9px;font-weight:800;letter-spacing:.5px;color:var(--muted);}
.mval{font-size:22px;font-weight:900;color:var(--gold);line-height:1;}
.munit{font-size:11px;color:var(--muted);}
.mdelta{font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;flex-shrink:0;}
.md-up{background:rgba(239,68,68,.15);color:#f87171;}
.md-dn{background:rgba(34,197,94,.15);color:var(--green);}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--card);border-radius:9px;margin-bottom:5px;}

.stitle{font-size:9px;font-weight:900;letter-spacing:1px;color:var(--muted);margin:14px 0 8px;}
.empty{text-align:center;padding:44px 20px;color:var(--muted);}
.empty-ico{font-size:36px;margin-bottom:10px;}
.empty-ttl{font-size:14px;font-weight:800;color:var(--text);margin-bottom:6px;}
.empty-txt{font-size:12px;line-height:1.5;}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:12px;color:#666;">Cargando tu portal...</div>
</div>

<div id="error-screen">
  <div style="font-size:44px;">🔒</div>
  <div style="font-size:16px;font-weight:900;color:#fff;margin-top:4px;">Enlace no válido</div>
  <div id="err-msg" style="font-size:13px;color:#888;max-width:300px;line-height:1.5;margin-top:8px;">
    El enlace no es válido. Pedile a tu coach que te mande el tuyo.
  </div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-row">
      <div class="avatar" id="av">?</div>
      <div>
        <div class="alumno-nombre" id="al-nombre">—</div>
        <div class="plan-badge" id="al-plan"></div>
        <div class="coach-tag">Coach: Christian Cattaneo</div>
      </div>
    </div>
  </div>

  <div class="tab on" id="tab-rutina">
    <div class="snav">
      <button class="snav-btn" id="btn-prev" onclick="movSem(-1)">&#8249;</button>
      <div class="snav-info">
        <div class="snav-num" id="sem-lbl">Semana 1</div>
        <div class="snav-dates" id="sem-dates"></div>
      </div>
      <button class="snav-btn" id="btn-next" onclick="movSem(1)">&#8250;</button>
    </div>
    <div class="slabel">DÍAS DE ENTRENAMIENTO</div>
    <div class="dgrid" id="dgrid"></div>
    <div id="sesion-ctn"></div>
  </div>

  <div class="tab" id="tab-cargas">
    <div id="info-ctn"></div>
  </div>

  <div class="tab" id="tab-medidas">
    <div id="medidas-ctn"></div>
  </div>

  <div class="tab" id="tab-running">
    <div id="running-ctn"></div>
  </div>

  <nav class="bnav">
    <button class="nb on" id="nb-rutina" onclick="goTab('rutina')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 7h8M8 12h8M8 17h5"/></svg>
      RUTINA
    </button>
    <button class="nb" id="nb-running" onclick="goTab('running')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/><path d="m7.5 13.5 2.5-3 3 2.5 2-2.5"/><path d="M17 17H7l-2-8h14l-2 8z"/></svg>
      RUNNING
    </button>
    <button class="nb" id="nb-cargas" onclick="goTab('cargas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      INFO
    </button>
    <button class="nb" id="nb-medidas" onclick="goTab('medidas')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      MEDIDAS
    </button>
  </nav>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const CFG = {
  apiKey:'AIzaSyDkSgbqAJJRdlLwzcn-2vSMjVIUJbkVUGQ',
  authDomain:'entrenamiento-laboratorio.firebaseapp.com',
  projectId:'entrenamiento-laboratorio',
  storageBucket:'entrenamiento-laboratorio.firebasestorage.app',
  messagingSenderId:'399177627945',
  appId:'1:399177627945:web:2b4fef0894480f70dc1f38'
};
const DN = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado','Domingo'];
const DS = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];

let _data=null, _plan=null, _planRun=null, _semIdx=0, _diaIdx=null, _runDiaIdx=null;

const TIPOS_RUN = {
  'pasadas':     {icon:'⚡', label:'Pasadas / Intervalos', color:'#f59e0b'},
  'continua-l':  {icon:'🟢', label:'Carrera continua larga', color:'#22c55e'},
  'continua-m':  {icon:'🔵', label:'Carrera continua media', color:'#3b82f6'},
  'continua-c':  {icon:'🟡', label:'Carrera continua corta', color:'#eab308'},
  'fartlek':     {icon:'🔶', label:'Fartlek', color:'#f97316'},
  'tempo':       {icon:'🔴', label:'Tempo run', color:'#ef4444'},
  'progresivos': {icon:'📈', label:'Progresivos', color:'#8b5cf6'},
  'recuperacion':{icon:'⚪', label:'Trote suave / Recuperación', color:'#94a3b8'},
  'descanso':    {icon:'😴', label:'Descanso activo', color:'#64748b'},
  'custom':      {icon:'✏️', label:'Personalizado', color:'#C9A84C'},
};

(async function(){
  const id = new URLSearchParams(location.search).get('id');
  if (!id) return showErr('No se encontró el identificador en el enlace.');

  // Manifest dinámico con start_url que incluye el ID del alumno
  const manifest = {
    name: 'Christian Cattaneo',
    short_name: 'C. Cattaneo',
    description: 'Portal de entrenamiento personalizado',
    start_url: 'https://cct-trainer.github.io/entrenamiento-laboratorio/alumno.html?id=' + encodeURIComponent(id),
    display: 'standalone',
    background_color: '#0d0d1a',
    theme_color: '#C9A84C',
    orientation: 'portrait',
    icons: [
      { src: 'https://cct-trainer.github.io/entrenamiento-laboratorio/icon-192.png', sizes: '192x192', type: 'image/png', purpose: 'any maskable' },
      { src: 'https://cct-trainer.github.io/entrenamiento-laboratorio/icon-512.png', sizes: '512x512', type: 'image/png', purpose: 'any maskable' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/json'});
  document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
  try {
    firebase.initializeApp(CFG);
    const db = firebase.firestore();
    const doc = await db.collection('alumnos').doc(id).get();
    if (!doc.exists) return showErr('Todavía no hay datos para este alumno. Pedile a tu coach que sincronice el portal desde su aplicación.');
    _data = doc.data();
    const planes = _data.planificaciones || [];
    // Separar planes de fuerza y running
    const planesFuerza  = planes.filter(p => p.tipoPlan !== 'running');
    const planesRunning = planes.filter(p => p.tipoPlan === 'running');
    _plan    = planesFuerza.length  ? planesFuerza[planesFuerza.length-1]   : null;
    _planRun = planesRunning.length ? planesRunning[planesRunning.length-1]  : null;
    if (_plan) {
      const hoy = new Date().toISOString().slice(0,10);
      let found = 0;
      (_plan.semanasArray||[]).forEach((s,i) => { if (s.fechaInicio && s.fechaInicio <= hoy) found = i; });
      _semIdx = found;
    }
    render();
  } catch(e) {
    console.error(e);
    showErr('Error de conexión. Verificá tu acceso a internet e intentá de nuevo.');
  }
})();

function showErr(msg) {
  document.getElementById('loading').style.display='none';
  document.getElementById('error-screen').style.display='flex';
  document.getElementById('err-msg').textContent=msg;
}

function render() {
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='flex';
  const p = _data.perfil||{};
  const nombre = p.nombre||p.name||'Alumno';
  document.getElementById('al-nombre').textContent = nombre;
  document.getElementById('av').textContent = nombre.charAt(0).toUpperCase();
  document.title = nombre+' — Lab. de Entrenamiento';
  if (_plan) document.getElementById('al-plan').textContent = (_plan.nombre||'Plan activo').toUpperCase();
  renderRutina();
}

function goTab(t) {
  ['rutina','running','cargas','medidas'].forEach(x => {
    document.getElementById('tab-'+x).classList.toggle('on',x===t);
    document.getElementById('nb-'+x).classList.toggle('on',x===t);
  });
  if (t==='cargas')  renderInfo();
  if (t==='medidas') renderMedidas();
  if (t==='running') renderRunning();
}

// ── RUTINA ────────────────────────────────────────────────────────────────
function movSem(d) {
  if (!_plan) return;
  const n = _semIdx+d, max = (_plan.semanasArray||[]).length-1;
  if (n<0||n>max) return;
  _semIdx=n; _diaIdx=null; renderRutina();
}

function renderRutina() {
  if (!_plan||!(_plan.semanasArray||[]).length) {
    document.getElementById('dgrid').innerHTML='';
    document.getElementById('sesion-ctn').innerHTML=noData('📋','Sin plan asignado','Tu coach aún no cargó tu planificación.');
    return;
  }
  const sems=_plan.semanasArray, sem=sems[_semIdx];
  document.getElementById('sem-lbl').textContent='Semana '+(_semIdx+1)+' de '+sems.length;
  if (sem.fechaInicio) {
    const lun=new Date(sem.fechaInicio+'T12:00:00');
    const dom=new Date(lun); dom.setDate(dom.getDate()+6);
    const f=d=>d.toLocaleDateString('es-AR',{day:'numeric',month:'short'});
    document.getElementById('sem-dates').textContent=f(lun)+' — '+f(dom);
  }
  document.getElementById('btn-prev').disabled=_semIdx===0;
  document.getElementById('btn-next').disabled=_semIdx>=sems.length-1;

  const hoyStr = new Date().toISOString().slice(0,10);
  const esHoy = i => {
    if (!sem.fechaInicio) return false;
    const d=new Date(sem.fechaInicio+'T12:00:00'); d.setDate(d.getDate()+i);
    return d.toISOString().slice(0,10)===hoyStr;
  };

  document.getElementById('dgrid').innerHTML = DS.map((ds,i) => {
    const has=!!(sem.dias?.[i]?.[0]?.bloques?.length);
    const on=i===_diaIdx, hoy=esHoy(i);
    const dayNum=sem.fechaInicio?(()=>{const d=new Date(sem.fechaInicio+'T12:00:00');d.setDate(d.getDate()+i);return d.getDate();})():i+1;
    return '<div class="dchip '+(has?'has ':'')+( on?'on ':'')+( hoy?'today ':'')+( !has?'no':'')+'" onclick="selDia('+i+')">'+
      '<span class="dl">'+ds+'</span>'+
      '<span class="dn">'+dayNum+'</span>'+
      (has&&!on?'<div class="ddot"></div>':'')+
    '</div>';
  }).join('');
  renderSesion();
}

function selDia(i) { _diaIdx=_diaIdx===i?null:i; renderRutina(); }

// Reproduce video de YouTube inline reemplazando la miniatura
function _playYt(uid, ytId) {
  const thumb  = document.getElementById('yt-thumb-'+uid);
  const player = document.getElementById('yt-player-'+uid);
  if (!thumb || !player) return;
  thumb.style.display = 'none';
  player.style.display = 'block';
  player.innerHTML = '<iframe src="https://www.youtube.com/embed/'+ytId+'?autoplay=1" width="100%" height="220" style="border:none;display:block;" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
}

function _toggleStatus(uid, state) {
  const ok = document.getElementById(uid+'-ok');
  const no = document.getElementById(uid+'-no');
  const card = document.getElementById(uid+'-card');
  if (!ok||!no) return;
  const wasActive = document.getElementById(uid+'-'+state).classList.contains('active');
  ok.classList.remove('active'); no.classList.remove('active');
  ok.style.cssText='flex:1;padding:9px;border-radius:8px;border:1.5px solid rgba(34,197,94,.3);background:rgba(34,197,94,.1);color:#22c55e;font-size:12px;font-weight:800;cursor:pointer;';
  no.style.cssText='flex:1;padding:9px;border-radius:8px;border:1.5px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#f87171;font-size:12px;font-weight:800;cursor:pointer;';
  if (card) { card.style.borderColor='rgba(255,255,255,.08)'; card.style.background='rgba(255,255,255,.03)'; }
  if (!wasActive) {
    const btn = document.getElementById(uid+'-'+state);
    btn.classList.add('active');
    if (state==='ok') {
      btn.style.cssText='flex:1;padding:9px;border-radius:8px;border:1.5px solid #16a34a;background:#16a34a;color:#fff;font-size:12px;font-weight:800;cursor:pointer;';
      if (card) { card.style.borderColor='#22c55e'; card.style.background='rgba(34,197,94,.06)'; }
    } else {
      btn.style.cssText='flex:1;padding:9px;border-radius:8px;border:1.5px solid #c62828;background:#c62828;color:#fff;font-size:12px;font-weight:800;cursor:pointer;';
      if (card) { card.style.borderColor='#ef4444'; card.style.background='rgba(239,68,68,.06)'; }
    }
  }
}

function _compilarFeedback() {
  if (_diaIdx===null||!_plan) return '';
  const sem = _plan.semanasArray?.[_semIdx];
  const ses = sem?.dias?.[_diaIdx]?.[0];
  if (!ses?.bloques?.length) return '';
  const nombre = _data?.perfil?.nombre || _data?.perfil?.name || 'Alumno';
  const fecha = new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});
  let txt = 'FEEDBACK DE ENTRENAMIENTO\n';
  txt += 'Alumno: '+nombre+'\n';
  txt += 'Fecha: '+fecha+' - Semana '+(_semIdx+1)+'\n';
  txt += 'Sesion: '+(ses.nombre||DN[_diaIdx])+'\n\n';
  ses.bloques.forEach((b,bi) => {
    const letra='ABCDEFGHIJ'[bi]||(bi+1);
    txt += 'BLOQUE '+letra+' - '+(b.nombre||'Bloque')+'\n';
    (b.ejercicios||[]).forEach((ej,ei) => {
      const uid='b'+bi+'e'+ei;
      const sArr=Array.isArray(ej.series)&&ej.series.length?ej.series:null;
      const cs=ej.ctrl?.series||ej.ctrlSeries||(sArr?String(sArr.length):'');
      const cr=ej.ctrl?.reps||ej.ctrlReps||(sArr?sArr[0]?.reps||'':'');
      const cp=ej.ctrl?.peso||ej.ctrlPeso||'';
      const rr=document.getElementById(uid+'-rr')?.value.trim()||'';
      const pr=document.getElementById(uid+'-pr')?.value.trim()||'';
      const cm=document.getElementById(uid+'-cm')?.value.trim()||'';
      const isOk=document.getElementById(uid+'-ok')?.classList.contains('active');
      const isNo=document.getElementById(uid+'-no')?.classList.contains('active');
      txt += '- '+(ej.nombre||'?')+'\n';
      if (cs||cr) txt += '  Plan: '+(cs?cs+'x':'')+cr+(cp?' | '+cp+'kg':'')+'\n';
      if (rr||pr) txt += '  Real: '+(rr?rr+' reps':'')+( pr?' | '+pr+' kg':'')+'\n';
      if (isOk)   txt += '  COMPLETADO\n';
      if (isNo)   txt += '  NO PUDE\n';
      if (cm)     txt += '  Nota: '+cm+'\n';
    });
    txt += '\n';
  });
  return txt.trim();
}

function _enviarWA() {
  const txt = _compilarFeedback();
  if (!txt) return;
  const url = 'https://wa.me/?text='+encodeURIComponent(txt);
  if (navigator.share) {
    navigator.share({text:txt}).catch(()=>window.open(url,'_blank'));
  } else {
    window.open(url,'_blank');
  }
}

// Extrae el ID de YouTube de cualquier formato de URL
function _ytId(url) {
  if (!url) return '';
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|shorts\/|embed\/))([^&?/\s]{11})/);
  return m ? m[1] : '';
}

// Construye la card completa de un ejercicio
function _ejCard(ej, uid) {
  // Referencias de ctrl (series efectivas)
  const sEfec  = Array.isArray(ej.series)     && ej.series.length     ? ej.series     : null;
  const sApro  = Array.isArray(ej.seriesApro) && ej.seriesApro.length ? ej.seriesApro : null;
  const sDrop  = Array.isArray(ej.dropset)    && ej.dropset.length    ? ej.dropset    : null;

  // Valores ctrl → prioriza series efectivas para el resumen
  const cs  = ej.ctrl?.series || ej.ctrlSeries || (sEfec ? String(sEfec.length) : (sApro ? String(sApro.length) : ''));
  const cr  = ej.ctrl?.reps   || ej.ctrlReps   || (sEfec ? sEfec[0]?.reps  || '' : '');
  const cp  = ej.ctrl?.peso   || ej.ctrlPeso   || (sEfec ? sEfec[0]?.peso  || '' : '');
  const cpa = ej.ctrl?.pausa  || ej.ctrlPausa  || (sEfec ? sEfec[0]?.pausa || '' : '');
  const ci  = ej.ctrl?.rir    || ej.ctrlRir    || (sEfec ? sEfec[0]?.rir   || '' : '');
  const hasCtrl = cs || cr || cpa || ci;

  // Helper: tabla de series con prefijo de etiqueta
  function _seriesTable(arr, prefijoLabel) {
    if (!arr || !arr.length) return '';
    const hasPeso  = arr.some(s=>s.peso);
    const hasRir   = arr.some(s=>s.rir);
    const hasPausa = arr.some(s=>s.pausa);
    const cellBg   = 'background:#0d0d1a;';
    const thStyle  = cellBg+'font-size:8px;font-weight:800;color:#888;padding:5px 8px;letter-spacing:1px;border:1px solid rgba(255,255,255,.08);text-align:center;';
    const tdBase   = cellBg+'text-align:center;padding:6px 8px;border:1px solid rgba(255,255,255,.08);';
    const head = '<tr>'+
      '<th style="'+thStyle+'">SERIE</th>'+
      '<th style="'+thStyle+'">REPS</th>'+
      (hasPeso  ? '<th style="'+thStyle+'">PESO</th>' : '')+
      (hasRir   ? '<th style="'+thStyle+'">RIR</th>'  : '')+
      (hasPausa ? '<th style="'+thStyle+'">PAUSA</th>': '')+
    '</tr>';
    const rows = arr.map((s,i) => {
      // Limpiar "kg/Kg" duplicado: si el valor ya contiene "kg" no agregar más
      const pesoVal = s.peso ? String(s.peso).replace(/kg$/i,'').trim() : null;
      const pesoStr = pesoVal ? pesoVal+' kg' : '—';
      return '<tr>'+
        '<td style="'+tdBase+'font-size:11px;font-weight:800;color:#fff;">'+prefijoLabel+' '+(i+1)+'</td>'+
        '<td style="'+tdBase+'font-size:13px;font-weight:700;color:#fff;">'+(s.reps||'—')+'</td>'+
        (hasPeso  ? '<td style="'+tdBase+'font-size:13px;font-weight:700;color:#fff;">'+pesoStr+'</td>' : '')+
        (hasRir   ? '<td style="'+tdBase+'font-size:11px;color:#fff;">'+(s.rir ? 'RIR '+s.rir : '—')+'</td>' : '')+
        (hasPausa ? '<td style="'+tdBase+'font-size:11px;color:#fff;">'+(s.pausa||'—')+'</td>' : '')+
      '</tr>';
    }).join('');
    return '<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;"><thead>'+head+'</thead><tbody>'+rows+'</tbody></table></div>';
  }

  // Grid SERIES / REPS / PAUSA / RIR  (resumen de series efectivas)
  const ctrlGrid = hasCtrl ? (() => {
    const cols = [
      cs  ? ['SERIES', cs]  : null,
      cr  ? ['REPS',   cr]  : null,
      cpa ? ['PAUSA',  cpa] : null,
      ci  ? ['RIR',    ci]  : null,
    ].filter(Boolean);
    return '<div style="display:grid;grid-template-columns:repeat('+cols.length+',1fr);border:1px solid rgba(201,168,76,.25);border-radius:8px;overflow:hidden;margin:10px 0;">'+
      cols.map((c,i) =>
        '<div style="padding:8px 6px;text-align:center;'+(i<cols.length-1?'border-right:1px solid rgba(201,168,76,.15);':'')+'">'+
          '<div style="font-size:8px;font-weight:800;color:#C9A84C;letter-spacing:1px;margin-bottom:3px;">'+c[0]+'</div>'+
          '<div style="font-size:18px;font-weight:900;color:#fff;line-height:1;">'+c[1]+'</div>'+
        '</div>'
      ).join('')+
    '</div>';
  })() : '';

  // Peso referencia (limpiar "Kg" duplicado)
  const cpClean = cp ? String(cp).replace(/kg$/i,'').trim() : '';
  const pesoRef = cpClean ? '<div style="font-size:10px;color:#888;margin-bottom:8px;">Ref. peso: <span style="color:#C9A84C;font-weight:700;">'+cpClean+' kg</span></div>' : '';

  // Sección de aproximación
  const aproSection = sApro ? (
    '<div style="font-size:9px;font-weight:800;color:#C9A84C;letter-spacing:1px;margin:10px 0 4px;">SERIES DE APROXIMACIÓN</div>'+
    _seriesTable(sApro, 'S. Aprox')
  ) : '';

  // Sección de series efectivas (tabla detallada)
  const efecSection = sEfec ? (
    '<div style="font-size:9px;font-weight:800;color:#C9A84C;letter-spacing:1px;margin:10px 0 4px;">SERIES EFECTIVAS</div>'+
    _seriesTable(sEfec, 'S. Efectiva')
  ) : '';

  // Sección de dropsets
  const dropSection = sDrop ? (
    '<div style="font-size:9px;font-weight:800;color:#C9A84C;letter-spacing:1px;margin:10px 0 4px;">DROPSETS</div>'+
    _seriesTable(sDrop, 'DS')
  ) : '';

  const seriesTable = aproSection + efecSection + dropSection;

  // Video inline (thumbnail → iframe al hacer clic)
  const ytId = _ytId(ej.video||'');
  const videoHTML = ytId ? (
    '<div style="margin:10px 0;border-radius:10px;overflow:hidden;position:relative;">'+
      '<div id="yt-thumb-'+uid+'" style="cursor:pointer;position:relative;" onclick="_playYt(\''+uid+'\',\''+ytId+'\')">'+
        '<img src="https://img.youtube.com/vi/'+ytId+'/hqdefault.jpg" alt="Video" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover;">'+
        '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);">'+
          '<div style="width:52px;height:52px;background:#ff0000;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(255,0,0,.5);">'+
            '<svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>'+
          '</div>'+
        '</div>'+
        '<div style="position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.5px;">▶ TOCÁ PARA VER</div>'+
      '</div>'+
      '<div id="yt-player-'+uid+'" style="display:none;"></div>'+
    '</div>'
  ) : '';

  // Inputs REAL + comentario + estado
  const feedbackHTML =
    '<div style="border-top:1px solid rgba(255,255,255,.06);margin-top:10px;padding:10px 0 4px;">'+
      '<div style="font-size:8px;font-weight:800;color:#22c55e;letter-spacing:1px;margin-bottom:8px;">TU REGISTRO</div>'+
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">'+
        '<div>'+
          '<div style="font-size:8px;color:#888;font-weight:700;margin-bottom:3px;">REPS REALES</div>'+
          '<input id="'+uid+'-rr" type="number" placeholder="'+(cr||'—')+'" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(34,197,94,.3);border-radius:6px;padding:8px 10px;color:#fff;font-size:14px;font-weight:700;outline:none;font-family:inherit;">'+
        '</div>'+
        '<div>'+
          '<div style="font-size:8px;color:#888;font-weight:700;margin-bottom:3px;">PESO REAL (kg)</div>'+
          '<input id="'+uid+'-pr" type="number" placeholder="'+(cp||'—')+'" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(34,197,94,.3);border-radius:6px;padding:8px 10px;color:#fff;font-size:14px;font-weight:700;outline:none;font-family:inherit;">'+
        '</div>'+
      '</div>'+
      '<textarea id="'+uid+'-cm" placeholder="Comentario..." rows="2" style="width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 10px;color:#fff;font-size:12px;resize:none;outline:none;font-family:inherit;margin-bottom:8px;"></textarea>'+
      '<div style="display:flex;gap:6px;">'+
        '<button id="'+uid+'-ok" onclick="_toggleStatus(\''+uid+'\',\'ok\')" style="flex:1;padding:9px;border-radius:8px;border:1.5px solid rgba(34,197,94,.3);background:rgba(34,197,94,.1);color:#22c55e;font-size:12px;font-weight:800;cursor:pointer;">✓ HECHO</button>'+
        '<button id="'+uid+'-no" onclick="_toggleStatus(\''+uid+'\',\'no\')" style="flex:1;padding:9px;border-radius:8px;border:1.5px solid rgba(239,68,68,.3);background:rgba(239,68,68,.1);color:#f87171;font-size:12px;font-weight:800;cursor:pointer;">✗ NO PUDE</button>'+
      '</div>'+
    '</div>';

  // ── SOLAPA INFORMACIÓN TÉCNICA ───────────────────────────────────────────
  const fichaHTML = (() => {
    const f = ej.ficha;
    const rows = [];

    // Músculos (varias fuentes posibles)
    const musc = (f && (f['MÚSCULOS'] || f['Músculos'] || f['musculos']))
               || ej.musculos
               || (Array.isArray(f?.musculos) ? f.musculos.join(', ') : '');
    if (musc) rows.push(['💪 MÚSCULOS', musc]);

    // Músculos secundarios
    const muscSec = f && (f['Músculos secundarios'] || f['MÚSCULOS SECUNDARIOS']);
    if (muscSec) rows.push(['➕ SECUNDARIOS', muscSec]);

    // Tipo de ejercicio
    const tipo = (f && (f['TIPO'] || f['Tipo'] || f['tipo'])) || ej.tipo || '';
    if (tipo) rows.push(['🏷 TIPO', tipo]);

    // Descripción / ejecución
    const desc = (f && (f['Descripción'] || f['DESCRIPCIÓN'] || f['ejecucion'] || f['desc']))
               || ej.ejecucion || '';
    if (desc) rows.push(['📋 EJECUCIÓN', desc]);

    if (!rows.length) return '';

    const rowsHTML = rows.map(([k, v]) =>
      '<div style="margin-bottom:10px;">'+
        '<div style="font-size:8px;font-weight:800;color:#C9A84C;letter-spacing:1px;margin-bottom:3px;">'+k+'</div>'+
        '<div style="font-size:12px;color:#d1d5db;line-height:1.55;">'+v+'</div>'+
      '</div>'
    ).join('');

    return (
      // Solapa/botón
      '<button onclick="_toggleFicha(\''+uid+'\')" style="'+
        'display:flex;align-items:center;gap:6px;margin-top:10px;'+
        'background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);'+
        'border-radius:6px;padding:6px 12px;cursor:pointer;width:100%;'+
        'color:#C9A84C;font-size:10px;font-weight:800;letter-spacing:.5px;'+
      '">'+
        '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4m0 4h.01"/></svg>'+
        'INFORMACIÓN TÉCNICA'+
        '<svg id="'+uid+'-fich-arr" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="margin-left:auto;transition:transform .2s;"><path d="M6 9l6 6 6-6"/></svg>'+
      '</button>'+
      // Panel desplegable
      '<div id="'+uid+'-fich" style="display:none;margin-top:6px;padding:12px;background:rgba(201,168,76,.05);border:1px solid rgba(201,168,76,.12);border-radius:8px;">'+
        rowsHTML+
      '</div>'
    );
  })();

  return '<div id="'+uid+'-card" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;margin-bottom:10px;overflow:hidden;transition:border-color .2s,background .2s;">'+
    '<div style="padding:12px 14px 12px;">'+
      '<div style="font-size:13px;font-weight:800;color:#fff;margin-bottom:2px;">'+(ej.nombre||'—')+'</div>'+
      (ej.musculos ? '<div style="font-size:10px;color:#888;margin-bottom:4px;">'+ej.musculos+'</div>' : '')+
      ctrlGrid+
      pesoRef+
      seriesTable+
      fichaHTML+
      videoHTML+
      feedbackHTML+
    '</div>'+
  '</div>';
}

function _toggleFicha(uid) {
  const panel = document.getElementById(uid+'-fich');
  const arr   = document.getElementById(uid+'-fich-arr');
  if (!panel) return;
  const open = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'block';
  if (arr) arr.style.transform = open ? '' : 'rotate(180deg)';
}

function _renderDiaRunning() {
  if (_runDiaIdx === null || !_planRun) return '';
  const diasData = _planRun.diasData || {};
  const bloques = diasData[_runDiaIdx] || [];
  if (!bloques.length) return '<div class="empty" style="padding:20px"><div class="empty-txt">Descanso — '+DN[_runDiaIdx]+'</div></div>';

  return bloques.map((b,bi) => {
    const tipoObj = TIPOS_RUN[b.tipo] || {icon:'🏃', label: b.label||b.tipo||'Sesión', color:'#C9A84C'};

    // Warmup
    const calent = b.calent && (b.calent.tipo||b.calent.duracion) ? (
      '<div style="background:rgba(255,167,38,.07);border-left:3px solid #ffa726;border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:8px;">'+
        '<div style="font-size:9px;font-weight:800;color:#ffa726;letter-spacing:1px;margin-bottom:6px;">🔥 ENTRADA EN CALOR</div>'+
        (b.calent.tipo ? '<div style="font-size:12px;color:#fff;font-weight:600;">'+b.calent.tipo+'</div>' : '')+
        (b.calent.duracion ? '<div style="font-size:11px;color:#aaa;margin-top:2px;">'+b.calent.duracion+'</div>' : '')+
        (b.calent.ritmo ? '<div style="font-size:11px;color:#aaa;">Ritmo: '+b.calent.ritmo+'</div>' : '')+
        (b.calent.ejercicios ? '<div style="font-size:11px;color:#aaa;margin-top:4px;line-height:1.4;">'+b.calent.ejercicios+'</div>' : '')+
      '</div>'
    ) : '';

    // Cooldown
    const vuelta = b.vuelta && (b.vuelta.tipo||b.vuelta.duracion) ? (
      '<div style="background:rgba(66,165,245,.07);border-left:3px solid #42a5f5;border-radius:0 8px 8px 0;padding:10px 12px;margin-top:8px;">'+
        '<div style="font-size:9px;font-weight:800;color:#42a5f5;letter-spacing:1px;margin-bottom:6px;">❄️ VUELTA A LA CALMA</div>'+
        (b.vuelta.tipo ? '<div style="font-size:12px;color:#fff;font-weight:600;">'+b.vuelta.tipo+'</div>' : '')+

        (b.vuelta.obs ? '<div style="font-size:11px;color:#aaa;margin-top:4px;line-height:1.4;">'+b.vuelta.obs+'</div>' : '')+
      '</div>'
    ) : '';

    // Main content según tipo
    let mainHTML = '';
    if (b.tipo === 'pasadas' && b.pasadas?.length) {
      const unidad = b.unidad||'m';
      const rows = b.pasadas.map((p,pi) =>
        '<tr>'+
          '<td style="background:rgba(245,158,11,.1);color:#f59e0b;font-size:10px;font-weight:800;text-align:center;padding:7px 8px;border:1px solid rgba(255,255,255,.06);">'+(pi+1)+'</td>'+
          '<td style="text-align:center;padding:7px 8px;border:1px solid rgba(255,255,255,.06);font-size:13px;font-weight:700;color:#fff;">'+(p.distancia||'—')+' '+unidad+'</td>'+
          '<td style="text-align:center;padding:7px 8px;border:1px solid rgba(255,255,255,.06);font-size:13px;font-weight:700;color:#C9A84C;">'+(p.ritmo||'—')+'/km</td>'+
          '<td style="text-align:center;padding:7px 8px;border:1px solid rgba(255,255,255,.06);font-size:11px;color:#888;">'+(p.pausa||'—')+'</td>'+
        '</tr>'
      ).join('');
      mainHTML = '<div style="overflow-x:auto;margin:10px 0;"><table style="width:100%;border-collapse:collapse;">'+
        '<thead><tr>'+
          '<th style="background:rgba(255,255,255,.04);font-size:8px;color:#888;font-weight:800;padding:6px 8px;border:1px solid rgba(255,255,255,.06);letter-spacing:1px;">#</th>'+
          '<th style="background:rgba(255,255,255,.04);font-size:8px;color:#888;font-weight:800;padding:6px 8px;border:1px solid rgba(255,255,255,.06);letter-spacing:1px;">DISTANCIA</th>'+
          '<th style="background:rgba(255,255,255,.04);font-size:8px;color:#888;font-weight:800;padding:6px 8px;border:1px solid rgba(255,255,255,.06);letter-spacing:1px;">RITMO</th>'+
          '<th style="background:rgba(255,255,255,.04);font-size:8px;color:#888;font-weight:800;padding:6px 8px;border:1px solid rgba(255,255,255,.06);letter-spacing:1px;">PAUSA</th>'+
        '</tr></thead><tbody>'+rows+'</tbody></table></div>';
    } else {
      // Continua, fartlek, tempo, progresivos, etc.
      const fields = [
        b.distancia ? ['DISTANCIA', b.distancia+(b.unidad||'')] : null,
        b.duracion  ? ['DURACIÓN',  b.duracion]  : null,
        b.ritmo     ? ['RITMO',     b.ritmo+'/km'] : null,
        b.ritmoMin  ? ['RITMO MÍN', b.ritmoMin+'/km'] : null,
        b.ritmoMax  ? ['RITMO MÁX', b.ritmoMax+'/km'] : null,
        b.fc        ? ['FC OBJETIVO', b.fc+' bpm'] : null,
        b.rpe       ? ['RPE', b.rpe] : null,
      ].filter(Boolean);
      if (fields.length) {
        mainHTML = '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0;">'+
          fields.map(([k,v]) =>
            '<div style="background:rgba(255,255,255,.04);border-radius:8px;padding:10px 12px;">'+
              '<div style="font-size:8px;font-weight:800;color:#C9A84C;letter-spacing:1px;margin-bottom:4px;">'+k+'</div>'+
              '<div style="font-size:16px;font-weight:900;color:#fff;">'+v+'</div>'+
            '</div>'
          ).join('')+
        '</div>';
      }
    }

    // Progresivos
    if (b.tipo === 'progresivos' && b.tramos?.length) {
      mainHTML += '<div style="margin-top:8px;">'+
        b.tramos.map((t,i) =>
          '<div style="display:flex;justify-content:space-between;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:6px;margin-bottom:4px;">'+
            '<span style="font-size:11px;font-weight:700;color:#8b5cf6;">Tramo '+(i+1)+'</span>'+
            '<span style="font-size:11px;color:#fff;">'+(t.distancia||'')+' '+(t.ritmo?'· '+t.ritmo+'/km':'')+'</span>'+
          '</div>'
        ).join('')+
      '</div>';
    }

    // Observaciones
    const obs = b.obs ? '<div style="font-size:11px;color:#aaa;line-height:1.5;margin-top:8px;padding:10px 12px;background:rgba(255,255,255,.03);border-radius:8px;">'+b.obs+'</div>' : '';

    return '<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-left:3px solid '+(tipoObj.color||'#C9A84C')+';border-radius:0 10px 10px 0;margin-bottom:12px;overflow:hidden;">'+
      '<div style="padding:12px 14px;">'+
        '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">'+
          '<span style="font-size:20px;">'+tipoObj.icon+'</span>'+
          '<div>'+
            '<div style="font-size:13px;font-weight:800;color:#fff;">'+tipoObj.label+'</div>'+
            (b.nombre ? '<div style="font-size:10px;color:#888;">'+b.nombre+'</div>' : '')+
          '</div>'+
        '</div>'+
        calent+mainHTML+vuelta+obs+
      '</div>'+
    '</div>';
  }).join('');
}

// ── INFO / BLOG ───────────────────────────────────────────────────────────
const _INFO_COLORS = {
  'Hipertrofia':'#C9A84C','Fuerza':'#ef4444','Running':'#22c55e',
  'Nutrición':'#f97316','Recuperación':'#3b82f6','Movilidad':'#a78bfa',
  'Ciencia del entrenamiento':'#06b6d4','Mental / Hábitos':'#ec4899','General':'#94a3b8'
};

let _infoArtOpen = null; // índice del artículo abierto, o null = lista

function renderInfo() {
  const ctn = document.getElementById('info-ctn');
  const arts = (_data && _data.articulos) ? _data.articulos.filter(a => a.publicado !== false) : [];
  if (!arts.length) {
    ctn.innerHTML = noData('📖','Sin contenido','Tu coach publicará artículos y recursos aquí próximamente.');
    return;
  }
  if (_infoArtOpen !== null && arts[_infoArtOpen]) {
    _renderInfoDetalle(arts[_infoArtOpen], ctn);
  } else {
    _infoArtOpen = null;
    _renderInfoLista(arts, ctn);
  }
}

function _renderInfoLista(arts, ctn) {
  ctn.innerHTML = arts.map((a, i) => {
    const color = _INFO_COLORS[a.categoria] || '#94a3b8';
    const tipoIcon = a.tipo === 'video' ? '▶' : a.tipo === 'link' ? '🔗' : '📄';
    const portadaHTML = a.portada
      ? '<div style="height:130px;background:url(\''+a.portada+'\') center/cover no-repeat;border-radius:8px 8px 0 0;margin:-14px -14px 10px;"></div>'
      : '';
    const preview = a.tipo === 'articulo' && a.contenido
      ? '<div style="font-size:12px;color:#888;margin-top:6px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">'+a.contenido+'</div>'
      : '';
    const linkLabel = a.tipo === 'link' ? '<div style="font-size:11px;color:#60a5fa;margin-top:6px;">🔗 Artículo externo</div>' : '';
    const videoLabel = a.tipo === 'video' ? '<div style="font-size:11px;color:#f87171;margin-top:6px;">▶ Video</div>' : '';
    return '<div onclick="_abrirInfoArt('+i+')" style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px 14px 12px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;" onmouseenter="this.style.borderColor=\'rgba(201,168,76,.4)\'" onmouseleave="this.style.borderColor=\'rgba(255,255,255,.08)\'">'+
      portadaHTML+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;">'+
        '<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.5px;">'+( a.categoria||'General')+'</span>'+
        (a.fecha ? '<span style="font-size:9px;color:#64748b;">'+a.fecha+'</span>' : '')+
      '</div>'+
      '<div style="font-size:14px;font-weight:800;color:#fff;line-height:1.3;">'+a.titulo+'</div>'+
      preview + linkLabel + videoLabel +
      '<div style="text-align:right;margin-top:8px;font-size:11px;color:#C9A84C;font-weight:700;">Leer →</div>'+
    '</div>';
  }).join('') + '<div style="height:20px;"></div>';
}

function _abrirInfoArt(i) {
  _infoArtOpen = i;
  renderInfo();
  document.getElementById('tab-cargas').scrollTop = 0;
}

function _volverInfoLista() {
  _infoArtOpen = null;
  renderInfo();
  document.getElementById('tab-cargas').scrollTop = 0;
}

function _renderInfoDetalle(a, ctn) {
  const color = _INFO_COLORS[a.categoria] || '#94a3b8';
  const ytUid = 'info-det-yt';

  // Portada
  const portadaHTML = a.portada
    ? '<img src="'+a.portada+'" alt="" style="width:calc(100% + 28px);margin:-14px -14px 14px;display:block;max-height:220px;object-fit:cover;">'
    : '';

  // Contenido según tipo
  let bodyHTML = '';
  if (a.tipo === 'video' && a.ytId) {
    bodyHTML =
      '<div style="margin-top:12px;border-radius:10px;overflow:hidden;position:relative;">'+
        '<div id="yt-thumb-'+ytUid+'" style="cursor:pointer;position:relative;" onclick="_playYt(\''+ytUid+'\',\''+a.ytId+'\')">'+
          '<img src="https://img.youtube.com/vi/'+a.ytId+'/hqdefault.jpg" style="width:100%;display:block;aspect-ratio:16/9;object-fit:cover;">'+
          '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);">'+
            '<div style="width:56px;height:56px;background:#ff0000;border-radius:50%;display:flex;align-items:center;justify-content:center;">'+
              '<svg width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>'+
            '</div>'+
          '</div>'+
          '<div style="position:absolute;bottom:8px;left:10px;background:rgba(0,0,0,.7);color:#fff;font-size:9px;font-weight:700;padding:3px 8px;border-radius:4px;">▶ TOCÁ PARA VER</div>'+
        '</div>'+
        '<div id="yt-player-'+ytUid+'" style="display:none;"></div>'+
      '</div>';
  } else if (a.tipo === 'link' && a.url) {
    bodyHTML =
      '<a href="'+a.url+'" target="_blank" rel="noopener" style="display:flex;align-items:center;gap:12px;margin-top:14px;padding:14px 16px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.25);border-radius:12px;text-decoration:none;">'+
        '<span style="font-size:28px;">🔗</span>'+
        '<div style="flex:1;min-width:0;">'+
          '<div style="font-size:13px;font-weight:800;color:#60a5fa;">Abrir artículo externo</div>'+
          '<div style="font-size:10px;color:#64748b;word-break:break-all;margin-top:3px;">'+a.url+'</div>'+
        '</div>'+
        '<span style="font-size:20px;color:#60a5fa;flex-shrink:0;">→</span>'+
      '</a>';
  } else if (a.tipo === 'articulo') {
    // Texto principal
    bodyHTML = a.contenido
      ? '<div style="margin-top:14px;font-size:14px;color:#d1d5db;line-height:1.75;white-space:pre-wrap;">'+a.contenido+'</div>'
      : '';
    // Imágenes adicionales intercaladas al final
    if (a.imagenes && a.imagenes.length) {
      bodyHTML += a.imagenes.map(url =>
        '<img src="'+url+'" alt="" style="width:100%;border-radius:10px;margin-top:14px;display:block;object-fit:cover;" onerror="this.style.display=\'none\'">'
      ).join('');
    }
  }

  ctn.innerHTML =
    '<div style="background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:14px;overflow:hidden;">'+
      portadaHTML+
      // Botón volver
      '<button onclick="_volverInfoLista()" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:7px 14px;color:#ccc;font-size:12px;font-weight:700;cursor:pointer;margin-bottom:14px;">'+
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>'+
        'Volver a artículos'+
      '</button>'+
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;">'+
        '<span style="background:'+color+'22;color:'+color+';border:1px solid '+color+'44;font-size:9px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:.5px;">'+(a.categoria||'General')+'</span>'+
        (a.fecha ? '<span style="font-size:9px;color:#64748b;">'+a.fecha+'</span>' : '')+
      '</div>'+
      '<div style="font-size:18px;font-weight:900;color:#fff;line-height:1.3;margin-bottom:4px;">'+a.titulo+'</div>'+
      bodyHTML+
    '</div>'+
    '<div style="height:30px;"></div>';
}

function renderCargas() { renderInfo(); } // backward compat

// ── MEDIDAS ───────────────────────────────────────────────────────────────
function renderMedidas() {
  const ctn=document.getElementById('medidas-ctn');
  const antro=_data.antropometria||[];
  if (!antro.length) { ctn.innerHTML=noData('📏','Sin medidas','Tu coach aún no registró tus mediciones.'); return; }
  const sorted=[...antro].sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||''));
  const ult=sorted[sorted.length-1], ant=sorted.length>1?sorted[sorted.length-2]:null;
  const ff=f=>f?new Date(f+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'long',year:'numeric'}):'';
  const campos=[
    {k:'peso',lb:'PESO CORPORAL',ic:'⚖️',u:'kg',lib:true},
    {k:'grasaCorporal',lb:'% GRASA',ic:'📊',u:'%',lib:true},
    {k:'masaMuscular',lb:'MASA MUSCULAR',ic:'💪',u:'kg',lib:false},
    {k:'imc',lb:'IMC',ic:'📐',u:'',lib:true},
    {k:'pecho',lb:'PECHO',ic:'📏',u:'cm',lib:false},
    {k:'cintura',lb:'CINTURA',ic:'📏',u:'cm',lib:true},
    {k:'cadera',lb:'CADERA',ic:'📏',u:'cm',lib:false},
    {k:'brazo',lb:'BRAZO',ic:'📏',u:'cm',lib:false},
    {k:'muslo',lb:'MUSLO',ic:'📏',u:'cm',lib:false},
  ];
  let html='<div class="stitle">ÚLTIMA MEDICIÓN — '+ff(ult.fecha)+'</div>';
  campos.forEach(c => {
    const v=ult[c.k]; if (!v) return;
    const av=ant?.[c.k];
    let delt='';
    if (av&&av!=v) {
      const d=(parseFloat(v)-parseFloat(av)).toFixed(1);
      const cls=parseFloat(d)<0?(c.lib?'md-dn':'md-up'):(c.lib?'md-up':'md-dn');
      delt='<span class="mdelta '+cls+'">'+(parseFloat(d)>0?'+':'')+d+c.u+'</span>';
    }
    html+='<div class="mcard"><div class="micon">'+c.ic+'</div><div style="flex:1;">'+
      '<div class="mlabel">'+c.lb+'</div>'+
      '<div style="display:flex;align-items:baseline;gap:4px;"><div class="mval">'+v+'</div><div class="munit">'+c.u+'</div></div>'+
    '</div>'+delt+'</div>';
  });
  if (sorted.length>1) {
    html+='<div class="stitle" style="margin-top:16px;">HISTORIAL</div>';
    [...sorted].reverse().slice(1).forEach(r => {
      html+='<div class="hist-row"><div style="font-size:11px;color:var(--muted);">'+ff(r.fecha)+'</div>'+
        '<div style="display:flex;gap:12px;">'+
          (r.peso?'<div style="font-size:12px;font-weight:800;color:var(--text);">'+r.peso+' kg</div>':'')+
          (r.grasaCorporal?'<div style="font-size:11px;color:var(--muted);">'+r.grasaCorporal+'%</div>':'')+
        '</div></div>';
    });
  }
  ctn.innerHTML=html;
}

function noData(ico,ttl,txt) {
  return '<div class="empty"><div class="empty-ico">'+ico+'</div><div class="empty-ttl">'+ttl+'</div>'+(txt?'<div class="empty-txt">'+txt+'</div>':'')+'</div>';
}
</script>
